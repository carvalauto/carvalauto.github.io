<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carval Auto - 后台管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0f4c81; --accent: #e63946; --bg-dark: #0f0f0f; --bg-card: #1a1a1a; --text: #f5f5f5; --text-muted: #888; --border: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; }

        .header { background: linear-gradient(135deg, var(--primary) 0%, #1a3a5c 100%); padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 100; }
        .header-logo { font-size: 16px; font-weight: 700; }
        .header-logo span { color: var(--accent); }
        .tab-nav { display: flex; gap: 4px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 7px 10px; cursor: pointer; font-size: 11px; font-weight: 500; border-radius: 5px; display: flex; align-items: center; gap: 4px; }
        .tab-btn.active { background: var(--accent); }
        .header-right a { color: white; text-decoration: none; font-size: 11px; padding: 6px 10px; background: rgba(255,255,255,0.1); border-radius: 5px; }

        .page { display: none; padding: 12px; max-width: 1400px; margin: 0 auto; }
        .page.active { display: block; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .stat-card { background: var(--bg-card); padding: 10px; border-radius: 6px; border-left: 3px solid var(--primary); }
        .stat-card.accent { border-left-color: var(--accent); }
        .stat-card.success { border-left-color: #2ecc71; }
        .stat-card.warning { border-left-color: #f39c12; }
        .stat-num { font-size: 20px; font-weight: 700; }
        .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

        .product-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .product-card { background: var(--bg-card); border-radius: 8px; overflow: hidden; display: flex; }
        .product-card-img { width: 80px; height: 80px; object-fit: cover; background: #2a2a2a; flex-shrink: 0; }
        .product-info { padding: 10px; flex: 1; min-width: 0; }
        .product-title { font-size: 12px; font-weight: 600; margin-bottom: 5px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
        .product-tag { font-size: 8px; padding: 2px 5px; border-radius: 3px; background: rgba(15,76,129,0.3); color: #6db3f2; }
        .product-tag.oem { background: rgba(230,57,70,0.2); color: #ff6b7a; }
        .product-actions { display: flex; gap: 6px; padding-top: 8px; border-top: 1px solid var(--border); }
        .btn { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; display: flex; align-items: center; gap: 4px; }
        .btn-danger { background: rgba(230,57,70,0.2); color: #ff6b7a; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: rgba(46,204,113,0.2); color: #7dcea0; }
        .btn-edit { background: rgba(52,152,219,0.2); color: #5dade2; }
        .btn-sm { padding: 5px 8px; font-size: 9px; }

        .inquiry-list { display: flex; flex-direction: column; gap: 8px; }
        .inquiry-card { background: var(--bg-card); border-radius: 8px; padding: 10px; border-left: 3px solid var(--primary); }
        .inquiry-card.unread { border-left-color: var(--accent); }
        .inquiry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .inquiry-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        .inquiry-info { flex: 1; min-width: 0; }
        .inquiry-name { font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .inquiry-email { font-size: 10px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .inquiry-badge { font-size: 8px; padding: 1px 4px; border-radius: 2px; background: var(--accent); color: white; }
        .inquiry-meta { display: flex; flex-wrap: wrap; gap: 5px; font-size: 9px; color: var(--text-muted); margin-bottom: 6px; }
        .inquiry-message { font-size: 11px; color: var(--text); line-height: 1.4; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-bottom: 8px; word-break: break-word; }
        .inquiry-actions { display: flex; flex-wrap: wrap; gap: 5px; }

        .login-card { background: var(--bg-card); padding: 25px 15px; border-radius: 10px; text-align: center; max-width: 300px; margin: 30px auto; }
        .login-card .logo { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
        .login-card .logo span { color: var(--accent); }
        .btn-google { background: white; color: #333; padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }

        .charts-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .chart-card { background: var(--bg-card); border-radius: 8px; padding: 10px; }
        .chart-title { font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .chart-title i { color: var(--primary); margin-right: 5px; }
        .date-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; background: var(--bg-card); padding: 8px 10px; border-radius: 6px; }
        .date-btn { background: rgba(255,255,255,0.1); border: none; color: var(--text); padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .date-btn.active { background: var(--primary); }
        .ga-user-info { display: flex; align-items: center; gap: 6px; margin-left: auto; }
        .btn-logout { background: rgba(230,57,70,0.2); color: #ff6b7a; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 9px; }

        .search-bar { margin-bottom: 12px; }
        .search-input { width: 100%; padding: 8px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 11px; }

        .loading { text-align: center; padding: 25px; color: var(--text-muted); }
        .loading i { font-size: 24px; margin-bottom: 6px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .toast { position: fixed; bottom: 12px; left: 12px; right: 12px; background: #2ecc71; color: white; padding: 10px 12px; border-radius: 5px; font-size: 11px; z-index: 1000; opacity: 0; transform: translateY(20px); transition: all 0.3s; text-align: center; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #e74c3c; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 12px; overflow-y: auto; }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-card); padding: 16px; border-radius: 8px; max-width: 280px; width: 100%; text-align: center; }
        .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .modal-text { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
        .modal-actions { display: flex; gap: 6px; justify-content: center; }

        .edit-modal { max-width: 500px; text-align: left; }
        .edit-form { display: flex; flex-direction: column; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .form-group input, .form-group select { padding: 10px 12px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .images-editor { display: flex; flex-direction: column; gap: 8px; }
        .image-item { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 5px; }
        .image-item img { width: 60px; height: 60px; object-fit: contain; background: #2a2a2a; border-radius: 4px; }
        .image-item input { flex: 1; padding: 6px 8px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 10px; }
        .btn-remove { padding: 4px 8px; background: rgba(230,57,70,0.2); color: #ff6b7a; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .btn-add-image { padding: 8px; background: rgba(46,204,113,0.1); color: #7dcea0; border: 1px dashed #7dcea0; border-radius: 5px; cursor: pointer; font-size: 11px; text-align: center; }
        .edit-actions { display: flex; gap: 8px; margin-top: 8px; }
        .edit-actions .btn { flex: 1; justify-content: center; padding: 10px; }

        .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
        .page-btn { padding: 6px 10px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 11px; border-radius: 4px; min-width: 36px; }
        .page-btn:hover { background: var(--primary); }
        .page-btn.active { background: var(--accent); }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .page-info { font-size: 11px; color: var(--text-muted); padding: 0 8px; }

        @media (min-width: 600px) {
            .header { padding: 12px 18px; }
            .header-logo { font-size: 18px; }
            .tab-btn { padding: 9px 14px; font-size: 12px; }
            .page { padding: 18px; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .stat-num { font-size: 24px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .product-card-img { width: 100px; height: 100px; }
            .charts-grid { grid-template-columns: repeat(2, 1fr); }
            .edit-modal { max-width: 550px; }
        }
        @media (min-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(7, 1fr); }
            .product-grid { grid-template-columns: repeat(3, 1fr); }
            .charts-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
    <script src="realtime-update.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-logo">CARVAL <span>AUTO</span></div>
        <div class="tab-nav">
            <button class="tab-btn active" id="tab-products" onclick="switchTab('products')"><i class="fas fa-box"></i> 商品</button>

            <a href="https://carvalautopart.com" target="_blank"><i class="fas fa-external-link-alt"></i> 网站</a>
        </div>
    </div>

    <div class="page active" id="page-products">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-num" id="totalCount">-</div><div class="stat-label">总商品</div></div>
            <div class="stat-card accent"><div class="stat-num" id="cat_japanese">-</div><div class="stat-label">日系</div></div>
            <div class="stat-card"><div class="stat-num" id="cat_korean">-</div><div class="stat-label">韩系</div></div>
            <div class="stat-card success"><div class="stat-num" id="cat_german">-</div><div class="stat-label">德系</div></div>
            <div class="stat-card warning"><div class="stat-num" id="cat_chinese">-</div><div class="stat-label">国产</div></div>
            <div class="stat-card"><div class="stat-num" id="cat_oil">-</div><div class="stat-label">机油</div></div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-num" id="inq_total">-</div><div class="stat-label">总询盘</div></div>
            <div class="stat-card accent"><div class="stat-num" id="inq_unread">-</div><div class="stat-label">未读</div></div>
            <div class="stat-card success"><div class="stat-num" id="inq_today">-</div><div class="stat-label">今日</div></div>
            <div class="stat-card warning"><div class="stat-num" id="inq_countries">-</div><div class="stat-label">国家</div></div>
        </div>
        <div class="inquiry-list" id="inquiryList"><div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div></div>
    </div>

    <div class="page" id="page-analytics">
        <div id="loginSection">
            <div class="login-card">
                <div class="logo">CARVAL <span>AUTO</span></div>
                <p>连接 Google Analytics<br>查看网站流量数据</p>
                <button class="btn-google" id="googleLoginBtn"><i class="fab fa-google"></i> Google 登录</button>

        </div>
        <div id="dashboardSection" style="display:none;">

            <div class="modal-title">确认删除</div>
            <div class="modal-text" id="deleteModalText">确定要删除吗？</div>

                <button class="btn btn-danger" id="confirmDeleteBtn">删除</button>

                <a href="https://carvalautopart.com/products.html" target="_blank" class="btn btn-primary" style="text-decoration:none;width:100%;justify-content:center;"><i class="fas fa-external-link-alt"></i> 查看网站</a>
                <button class="btn" id="closeSuccessBtn" style="background:var(--border);width:100%;">关闭</button>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
    // ===== 数据同步通知系统 v2 =====
    // 使用 BroadcastChannel 通知同源页面数据变化
    var dataSyncChannel = null;
    try {
        dataSyncChannel = new BroadcastChannel('carval_products_sync');
    } catch(e) {
        console.log('BroadcastChannel 不支持，使用 localStorage 事件');
    }

    // 广播数据变化
    function broadcastDataChange(action, productId) {
        var payload = {
            type: 'products_updated',
            action: action, // 'edit' or 'delete'
            productId: productId,
            timestamp: Date.now(),
            source: 'admin'
        };

        if (dataSyncChannel) {
            dataSyncChannel.postMessage(payload);
            console.log('[Sync] 已广播数据变化:', action, productId);
        }

        // 同时更新 localStorage 作为备用机制
        localStorage.setItem('carval_data_change', JSON.stringify(payload));
        localStorage.removeItem('carval_data_change'); // 触发其他页面的 storage 事件
        localStorage.setItem('carval_data_change', JSON.stringify(payload));
    }

    // 🚀 阿里云 OSS 配置
    var OSS_BUCKET = 'carvalauto-products';
    var OSS_REGION = 'oss-cn-hangzhou';
    var OSS_ENDPOINT = 'https://carvalauto-products.oss-cn-hangzhou.aliyuncs.com';
    // OSS密钥已移至后端，不再在前端暴露
    // OSS密钥已移至后端，不再在前端暴露
    // API 配置
    var API_BASE = 'https://carvalauto-api.vercel.app/api';
    var API_KEY = 'carvalauto-secure-api-key-2026';
    var OSS_URL = 'https://carvalauto-products.oss-cn-hangzhou.aliyuncs.com/products.json';
    var GA_CLIENT_ID = '559377365954-4eutm6cufnggnskn8v35139vpo11opbo.apps.googleusercontent.com';
    var GA_PROPERTY_ID = '529242507';

    var allProducts = [], allInquiries = [], accessToken = null, deleteTarget = null;
    var editingProductId = null;
    var currentProductPage = 1;
    var productsPerPage = 20;

    // 🔐 生成 OSS 签名 (ES5 兼容)
    function generateOSSSignature(method, resource, contentType, date) {
      var stringToSign = [method, '', contentType || '', date, resource].join('\n');
      console.log('[Admin] StringToSign:', stringToSign);

      return new Promise(function(resolve, reject) {
        var encoder = new TextEncoder();
        var keyData = encoder.encode(ALIBABA_ACCESS_KEY_SECRET);
        var messageData = encoder.encode(stringToSign);

        crypto.subtle.importKey(
          'raw',
          keyData,
          { name: 'HMAC', hash: 'SHA-1' },
          false,
          ['sign']
        ).then(function(key) {
          return crypto.subtle.sign('HMAC', key, messageData);
        }).then(function(signature) {
          var signatureBase64 = btoa(String.fromCharCode.apply(null, new Uint8Array(signature)));
          resolve(signatureBase64);
        }).catch(function(e) {
          reject(e);
        });
      });
    }

    // 📤 上传文件到 OSS (ES5 兼容)
    function uploadToOSS(filename, content, contentType) {
      contentType = contentType || 'application/json';
      var date = new Date().toUTCString();
      var resource = '/' + OSS_BUCKET + '/' + filename;

      console.log('[Admin] 上传到OSS: ' + filename + ', 大小: ' + (JSON.stringify(content).length / 1024).toFixed(1) + 'KB');

      return new Promise(function(resolve, reject) {
        generateOSSSignature('PUT', resource, contentType, date).then(function(signature) {
          var url = OSS_ENDPOINT + '/' + filename;

          var headers = {
            'Authorization': 'OSS ' + ALIBABA_ACCESS_KEY_ID + ':' + signature,
            'Date': date,
            'Content-Type': contentType
          };

          var body = typeof content === 'string' ? content : JSON.stringify(content, null, 2);

          return fetch(url, {
            method: 'PUT',
            headers: headers,
            body: body
          }).then(function(response) {
            if (!response.ok) {
              return response.text().then(function(errorText) {
                reject(new Error('OSS上传失败 (' + response.status + '): ' + errorText));
              });
            }
            console.log('[Admin] ✅ OSS上传成功: ' + filename);
            resolve({ success: true });
          }).catch(function(e) {
            reject(e);
          });
        }).catch(function(e) {
          reject(e);
        });
      });
    }

    function loadProducts() {
        if (!checkToken()) return;
        var c = document.getElementById('productList');
        c.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>';
        fetch(OSS_URL + '?t=' + Date.now()).then(function(r) {
            if (!r.ok) throw new Error('OSS加载失败');
            return r.text();
        }).then(function(content) {
            allProducts = JSON.parse(content);
            console.log('[Admin] 从OSS加载产品，数量:', allProducts.length);

            renderProducts();

        }).catch(function(e) {
            console.error('[Admin] Load error:', e);
            var cached = localStorage.getItem('cached_products');
            if (cached) {
                try {
                    var cachedData = JSON.parse(cached);
                    allProducts = cachedData.data;
                    renderProducts();
                    showToast('使用缓存数据', false);

    function renderProducts() {
        var c = document.getElementById('productList');
        var searchTerm = document.getElementById('productSearch').value.toLowerCase();
        var filtered = allProducts;
        if (searchTerm) {
            filtered = allProducts.filter(function(p) {
                return (p.name || p.title || '').toLowerCase().indexOf(searchTerm) !== -1 ||
                       (p.oem || p.oemCode || '').toLowerCase().indexOf(searchTerm) !== -1;
            });
        }
        document.getElementById('totalCount').textContent = filtered.length;
        var cats = { japanese: 0, korean: 0, german: 0, chinese: 0, oil: 0, other: 0 };
        filtered.forEach(function(x) {
            var cat = (x.category || 'other').toLowerCase();
            if (cats[cat] !== undefined) cats[cat]++; else cats.other++;
        });
        Object.keys(cats).forEach(function(k) {
            var el = document.getElementById('cat_' + k);
            if (el) el.textContent = cats[k];
        });
        var totalPages = Math.ceil(filtered.length / productsPerPage);
        if (currentProductPage > totalPages) currentProductPage = totalPages || 1;
        var startIndex = (currentProductPage - 1) * productsPerPage;
        var endIndex = startIndex + productsPerPage;
        var pageProducts = filtered.slice(startIndex, endIndex);
        if (!filtered.length) {
            c.innerHTML = '<div class="loading"><i class="fas fa-box-open"></i><p>暂无商品</p></div>';
            document.getElementById('productPagination').innerHTML = '';
            return;
        }
        c.innerHTML = pageProducts.map(function(x) {
            var img = (x.image || x.images || '').toString().split(',')[0] || '';
            var cat = (x.category || 'other').toUpperCase();
            var name = (x.name || x.title || '未命名').toString();
            var oem = x.oem || x.oemCode || '';
            return '<div class="product-card">' +
                (img ? '<img src="' + img + '" class="product-card-img" alt="" onerror="this.style.display=\'none\'">' : '<div class="product-card-img" style="display:flex;align-items:center;justify-content:center;color:#555;font-size:24px;"><i class="fas fa-image"></i></div>') +
                '<div class="product-info">' +
                    '<div class="product-title" title="' + name.replace(/"/g, '&quot;') + '">' + name.substring(0, 40) + (name.length > 40 ? '...' : '') + '</div>' +
                    '<div class="product-meta"><span class="product-tag">' + cat + '</span>' + (oem ? '<span class="product-tag oem">OEM: ' + oem.substring(0, 15) + '</span>' : '') + '</div>' +
                    '<div class="product-actions">' +
                        '<button class="btn btn-edit" onclick="openEditModalById(' + x.id + ')"><i class="fas fa-edit"></i> 编辑</button>' +
                        '<button class="btn btn-danger" onclick="confirmDeleteProduct(' + x.id + ', \'' + name.replace(/'/g, "\\'") + '\')"><i class="fas fa-trash"></i></button>' +
                    '</div>' +
                '</div></div>';
        }).join('');
        renderProductPagination(totalPages, filtered.length);
    }

    function renderProductPagination(totalPages, totalItems) {
        var pEl = document.getElementById('productPagination');
        if (totalPages <= 1) { pEl.innerHTML = ''; return; }
        var html = '<button class="page-btn" onclick="goToProductPage(' + (currentProductPage - 1) + ')" ' + (currentProductPage === 1 ? 'disabled' : '') + '>&laquo; 上一页</button>';
        for (var i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentProductPage - 2 && i <= currentProductPage + 2)) {
                html += '<button class="page-btn ' + (i === currentProductPage ? 'active' : '') + '" onclick="goToProductPage(' + i + ')">' + i + '</button>';
            } else if (i === currentProductPage - 3 || i === currentProductPage + 3) {
                html += '<span class="page-info">...</span>';
            }
        }
        html += '<button class="page-btn" onclick="goToProductPage(' + (currentProductPage + 1) + ')" ' + (currentProductPage === totalPages ? 'disabled' : '') + '>下一页 &raquo;</button>';
        var startItem = (currentProductPage - 1) * productsPerPage + 1;
        var endItem = Math.min(currentProductPage * productsPerPage, totalItems);
        html += '<span class="page-info">' + startItem + '-' + endItem + ' / ' + totalItems + '</span>';
        pEl.innerHTML = html;
    }

    // ===== 保存编辑 - 修复版：支持0延迟实时更新 =====
    function saveProductEdit() {
        if (!editingProductId) return;
        var title = document.getElementById('editTitle').value.trim();
        var category = document.getElementById('editCategory').value;
        var oem = document.getElementById('editOem').value.trim();
        var imageInputs = document.querySelectorAll('.image-item .image-url');
        var images = Array.prototype.slice.call(imageInputs).map(function(i) { return i.value.trim(); }).filter(Boolean);
        var imageStr = images.join(',');

        showToast('正在保存...', false);

        // 1. 🚀 从 OSS 快速加载数据
        fetch(OSS_URL + '?t=' + Date.now()).then(function(r) {
            if (!r.ok) throw new Error('OSS加载失败');
            return r.text();
        }).then(function(content) {
            var products = JSON.parse(content);
            console.log('[Admin] 从OSS加载产品用于编辑，数量:', products.length);

            var index = products.findIndex(function(x) { return x.id == editingProductId || x.id === parseInt(editingProductId); });
            if (index !== -1) {
                if (title) { products[index].name = title; products[index].title = title; }
                products[index].category = category;
                products[index].oem = oem;
                products[index].oemCode = oem;
                products[index].image = imageStr;
                products[index].images = images;
                products[index].updatedAt = new Date().toISOString();
            }

            // 2. 📤 上传到 OSS
            return uploadToOSS('products.json', products);
        }).then(function() {
            // 3. 🔄 更新 version.json 触发前端实时更新
            var newVersion = Date.now();
            return uploadToOSS('version.json', {
                version: newVersion,
                message: '编辑产品: ' + editingProductId + ' via admin - ' + new Date().toISOString(),
                totalProducts: allProducts.length,
                lastUpdate: new Date().toISOString(),
                source: 'admin_edit'
            });
        }).then(function() {
            return fetch(OSS_URL + '?t=' + Date.now()).then(function(r) { return r.text(); });
        }).then(function(content) {
            allProducts = JSON.parse(content);
            renderProducts();
            closeEditModal();

            broadcastDataChange('edit', editingProductId);

            showSuccessModal('保存成功！', '商品信息已更新，前端页面将在5秒内自动刷新');
        }).catch(function(e) {
            showToast('保存失败: ' + e.message, true);
        });
    }

    // ===== 删除商品 - 修复版：添加数据同步广播 =====
    function executeDelete() {
        if (!deleteTarget) return;
        var targetType = deleteTarget.type;
        var targetId = deleteTarget.id;
        closeDeleteModal();
        if (targetType === 'product') {
            showToast('正在删除...', false);
            // 1. 🚀 从 OSS 快速加载数据
            fetch(OSS_URL + '?t=' + Date.now()).then(function(r) {
                if (!r.ok) throw new Error('OSS加载失败');
                return r.text();
            }).then(function(content) {
                var p = JSON.parse(content);
                console.log('[Admin] 从OSS加载产品用于删除，数量:', p.length);

                var beforeCount = p.length;
                p = p.filter(function(x) { return x.id != targetId && x.id !== parseInt(targetId); });
                if (beforeCount === p.length) { showToast('未找到该商品', true); return Promise.reject('未找到该商品'); }

                // 2. 📤 上传到 OSS
                return uploadToOSS('products.json', p);
            }).then(function() {
                // 3. 🔄 更新 version.json 触发前端实时更新
                var newVersion = Date.now();
                return uploadToOSS('version.json', {
                    version: newVersion,
                    message: '删除产品: ' + targetId + ' via admin - ' + new Date().toISOString(),
                    totalProducts: allProducts.length - 1,
                    lastUpdate: new Date().toISOString(),
                    source: 'admin_delete'
                });
            }).then(function() {
                return fetch(OSS_URL + '?t=' + Date.now()).then(function(r) { return r.text(); });
            }).then(function(content) {
                allProducts = JSON.parse(content);
                renderProducts();

                // ===== 关键修复：广播数据变化通知前端 =====
                broadcastDataChange('delete', targetId);

                showSuccessModal('删除成功！', '商品已删除，前端页面将自动刷新');
            }).catch(function(e) {
                if (e !== '未找到该商品') {
                    showToast('删除失败: ' + e.message, true);
                }
            });
        }
    }

    // ===== API 请求封装 =====
    function apiRequest(endpoint, method, body) {
        var options = {
            method: method || 'GET',
            headers: {
                'Content-Type': 'application/json',
                'X-API-Key': API_KEY
            }
        };
        if (body) {
            options.body = JSON.stringify(body);
        }
        return fetch(API_BASE + endpoint, options)
            .then(function(r) {
                if (!r.ok) {
                    return r.json().then(function(err) {
                        throw new Error(err.error || 'API 请求失败: ' + r.status);
                    }).catch(function() {
                        throw new Error('API 请求失败: ' + r.status);
                    });
                }
                return r.json();
            });
    }

    function initAnalytics() {
        var saved = localStorage.getItem('ga_token');
        var expiry = parseInt(localStorage.getItem('ga_token_expiry') || '0');
        if (saved && Date.now() < expiry) {
            accessToken = saved;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            loadAllData();
        } else {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
        }
    }

    function handleLogin() {
        if (typeof google === 'undefined') { showToast('Google API未加载', true); return; }
        var client = google.accounts.oauth2.initTokenClient({
            client_id: GA_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/analytics.readonly',
            callback: function(r) {
                if (r.access_token) {
                    accessToken = r.access_token;
                    localStorage.setItem('ga_token', accessToken);
                    localStorage.setItem('ga_token_expiry', Date.now() + 3600000);
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboardSection').style.display = 'block';
                    loadAllData();
                }
            }
        });
        client.requestAccessToken();
    }

    function handleLogout() {
        accessToken = null;
        localStorage.removeItem('ga_token');
        localStorage.removeItem('ga_token_expiry');
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
    }

    document.getElementById('logoutBtn').onclick = handleLogout;

    function fetchRealtimeData() {

            method: 'POST',

        }).then(function(r) { return r.json(); }).then(function(d) {
            var count = d.rows ? d.rows[0].metricValues[0].value : '0';
            document.getElementById('statRealtime').textContent = count;
        }).catch(function(e) { console.error('Realtime error:', e); });

    function fetchOverviewData() {
        fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runReport', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                dateRanges: [{ startDate: currentDateRange, endDate: 'today' }],
                metrics: [
                    { name: 'screenPageViews' },
                    { name: 'totalUsers' },
                    { name: 'sessions' },
                    { name: 'averageSessionDuration' }
                ]
            })
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.rows) {
                var row = d.rows[0];
                document.getElementById('statPageviews').textContent = row.metricValues[0].value;
                document.getElementById('statUsers').textContent = row.metricValues[1].value;
                document.getElementById('statSessions').textContent = row.metricValues[2].value;
                var avgDur = parseFloat(row.metricValues[3].value) || 0;
                var mins = Math.floor(avgDur / 60);
                var secs = Math.floor(avgDur % 60);
                document.getElementById('statDuration').textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
            }
        }).catch(function(e) { console.error('Overview error:', e); });
    }

    function fetchTrafficData() {
        // 流量趋势
        fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runReport', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                dateRanges: [{ startDate: currentDateRange, endDate: 'today' }],
                dimensions: [{ name: 'date' }],
                metrics: [{ name: 'screenPageViews' }],
                orderBys: [{ dimension: { dimensionName: 'date' }, desc: false }]
            })
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.rows) {
                var labels = d.rows.map(function(row) {
                    var date = row.dimensionValues[0].value;
                    return date.substring(4,6) + '/' + date.substring(6,8);
                });
                var values = d.rows.map(function(row) { return parseInt(row.metricValues[0].value); });
                if (trendChart) trendChart.destroy();
                var ctx = document.getElementById('trendChart').getContext('2d');
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '浏览量',
                            data: values,
                            borderColor: '#0f4c81',
                            backgroundColor: 'rgba(15,76,129,0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                });
            }

            // 国家分布
            return fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runReport', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dateRanges: [{ startDate: currentDateRange, endDate: 'today' }],
                    dimensions: [{ name: 'country' }],
                    metrics: [{ name: 'sessions' }],
                    orderBys: [{ metric: { metricName: 'sessions' }, desc: true }],
                    limit: 5
                })
            });
        }).then(function(r) { return r.json(); }).then(function(d2) {
            if (d2.rows) {
                var cLabels = d2.rows.map(function(row) { return row.dimensionValues[0].value; });
                var cValues = d2.rows.map(function(row) { return parseInt(row.metricValues[0].value); });
                if (countryChart) countryChart.destroy();
                var ctx2 = document.getElementById('countryChart').getContext('2d');
                countryChart = new Chart(ctx2, {
                    type: 'doughnut',
                    data: {
                        labels: cLabels,
                        datasets: [{ data: cValues, backgroundColor: ['#0f4c81', '#e63946', '#2ecc71', '#f39c12', '#9b59b6'] }]
                    },
                    options: { responsive: true }
                });
            }

            // 设备分布
            return fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runReport', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dateRanges: [{ startDate: currentDateRange, endDate: 'today' }],
                    dimensions: [{ name: 'deviceCategory' }],
                    metrics: [{ name: 'sessions' }],
                    orderBys: [{ metric: { metricName: 'sessions' }, desc: true }]
                })
            });
        }).then(function(r) { return r.json(); }).then(function(d3) {
            if (d3.rows) {
                var devLabels = d3.rows.map(function(row) { return row.dimensionValues[0].value === 'desktop' ? '电脑' : row.dimensionValues[0].value === 'mobile' ? '手机' : '平板'; });
                var devValues = d3.rows.map(function(row) { return parseInt(row.metricValues[0].value); });
                if (deviceChart) deviceChart.destroy();
                var ctx3 = document.getElementById('deviceChart').getContext('2d');
                deviceChart = new Chart(ctx3, {
                    type: 'pie',
                    data: {
                        labels: devLabels,
                        datasets: [{ data: devValues, backgroundColor: ['#0f4c81', '#e63946', '#f39c12'] }]
                    },
                    options: { responsive: true }
                });
            }
        }).catch(function(e) { console.error('Traffic error:', e); });
    }
    </script>
</body>
</html>
