<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Carval Auto - 后台管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }
        :root {
            --primary: #0f4c81;
            --accent: #e63946;
            --dark: #1a1a1a;
            --success: #2ecc71;
            --warning: #f39c12;
            --info: #3498db;
            --border: #dee2e6;
        }

        /* ===== 顶部栏 ===== */
        .admin-header {
            background: var(--dark); color: white;
            padding: 0 30px;
            display: flex; align-items: stretch; justify-content: space-between;
            border-bottom: 4px solid var(--accent);
            position: sticky; top: 0; z-index: 100;
            height: 60px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-logo { font-family: 'Oswald', sans-serif; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
        .header-logo span { color: var(--accent); }
        .header-divider { width: 1px; height: 30px; background: #444; }
        .tab-nav { display: flex; height: 100%; }
        .tab-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 0 24px; color: #aaa; cursor: pointer;
            font-family: 'Oswald', sans-serif; font-size: 14px;
            text-transform: uppercase; letter-spacing: 1px;
            border: none; background: transparent;
            border-bottom: 3px solid transparent;
            transition: all 0.3s; margin-bottom: -4px;
        }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: white; border-bottom-color: var(--accent); background: rgba(255,255,255,0.05); }
        .tab-btn i { font-size: 15px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-right a { color: #888; font-size: 12px; text-decoration: none; font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px; padding: 5px 10px; border: 1px solid #444; transition: all 0.3s; }
        .header-right a:hover { color: white; border-color: var(--accent); }

        /* ===== 页面切换 ===== */
        .page { display: none; }
        .page.active { display: block; }

        /* ===== 通用卡片 ===== */
        .card { background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 22px; }
        .card-header { background: var(--primary); color: white; padding: 16px 22px; font-family: 'Oswald', sans-serif; font-size: 15px; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 10px; border-left: 5px solid var(--accent); }
        .card-body { padding: 22px; }

        /* ===== 商品管理 ===== */
        .products-page { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-left: 5px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-card.accent { border-left-color: var(--accent); }
        .stat-num { font-family: 'Oswald', sans-serif; font-size: 32px; font-weight: bold; color: var(--primary); }
        .stat-card.accent .stat-num { color: var(--accent); }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 1200px) { .content-grid { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-family: 'Oswald', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 7px; }
        .form-group label .required { color: var(--accent); margin-left: 3px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; border: 1.5px solid #ddd; font-family: 'Roboto', sans-serif; font-size: 14px; transition: border 0.3s; outline: none; background: #fafafa; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); background: white; }
        .form-group textarea { min-height: 90px; resize: vertical; }

        .btn { padding: 13px 28px; font-family: 'Oswald', sans-serif; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; border: none; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; justify-content: center; }
        .btn-primary:hover { background: #0a3a6e; transform: translateY(-2px); }
        .btn-success { background: var(--success); color: white; width: 100%; justify-content: center; }
        .btn-success:hover { background: #27ae60; }
        .btn-danger { background: var(--accent); color: white; padding: 5px 12px; font-size: 12px; }
        .btn-danger:hover { background: #c0392b; }
        .btn-small { padding: 6px 12px; font-size: 12px; }

        /* ===== AI 导入模块 ===== */
        .ai-section { background: #f9f9f9; padding: 20px; border-radius: 4px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .ai-section h3 { font-family: 'Oswald', sans-serif; color: var(--accent); margin-bottom: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .ai-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .ai-tab-btn { padding: 8px 16px; background: white; border: 1px solid #ddd; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .ai-tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .ai-tab-content { display: none; }
        .ai-tab-content.active { display: block; }

        .ai-result-list { max-height: 400px; overflow-y: auto; background: white; border: 1px solid #ddd; padding: 10px; margin-top: 10px; }
        .ai-result-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; }
        .ai-result-item:last-child { border-bottom: none; }
        .ai-result-item strong { color: var(--primary); }

        /* ===== 商品列表 ===== */
        .product-list-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .product-list-table th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
        .product-list-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .product-list-table tr:hover { background: #f9f9f9; }
        .product-list-table .action-btn { padding: 4px 8px; margin: 0 2px; font-size: 11px; }
        .product-list-scroll { max-height: 500px; overflow-y: auto; }

        /* ===== 流量分析 ===== */
        .analytics-page { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .chart-container { background: white; padding: 20px; border-radius: 4px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .chart-container h3 { font-family: 'Oswald', sans-serif; margin-bottom: 15px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* ===== 客户询盘 ===== */
        .inquiries-page { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .inquiry-item { background: white; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .inquiry-item.unread { border-left-color: var(--accent); background: #fffbf0; }
        .inquiry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .inquiry-name { font-weight: 600; color: var(--primary); }
        .inquiry-time { font-size: 12px; color: #888; }
        .inquiry-content { color: #555; line-height: 1.6; margin: 10px 0; }
        .inquiry-contact { font-size: 12px; color: #888; }

        /* ===== 吐司提示 ===== */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 15px 20px; border-radius: 4px; z-index: 9999; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(400px); } to { transform: translateX(0); } }

        /* ===== 模态框 ===== */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 4px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-header { font-family: 'Oswald', sans-serif; font-size: 18px; margin-bottom: 20px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #888; }
        .modal-close:hover { color: #333; }

        .loading { text-align: center; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ===== 顶部导航 ===== -->
<div class="admin-header">
    <div class="header-left">
        <div class="header-logo">CARVAL <span>AUTO</span> — 后台管理</div>
        <div class="header-divider"></div>
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('products')">
                <i class="fas fa-box"></i> 商品管理
            </button>
            <button class="tab-btn" onclick="switchTab('analytics')">
                <i class="fas fa-chart-line"></i> 流量分析
            </button>
            <button class="tab-btn" onclick="switchTab('inquiries')">
                <i class="fas fa-envelope"></i> 客户询盘
            </button>
        </div>
    </div>
    <div class="header-right">
        <a href="https://carvalautopart.com/products.html" target="_blank">查看网站</a>
    </div>
</div>

<!-- ===== 商品管理页面 ===== -->
<div id="products" class="page active">
    <div class="products-page">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-num" id="totalProducts">0</div>
                <div class="stat-label">总商品数</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="japaneseCount">0</div>
                <div class="stat-label">日系车</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="koreanCount">0</div>
                <div class="stat-label">韩系车</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="germanCount">0</div>
                <div class="stat-label">德系车</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="chineseCount">0</div>
                <div class="stat-label">国产车</div>
            </div>
            <div class="stat-card accent">
                <div class="stat-num" id="otherCount">0</div>
                <div class="stat-label">其他</div>
            </div>
        </div>

        <div class="content-grid">
            <!-- 左侧：AI 批量导入 -->
            <div>
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-magic"></i> AI 批量导入
                    </div>
                    <div class="card-body">
                        <div class="ai-section">
                            <h3>导入方式</h3>
                            <div class="ai-tabs">
                                <button class="ai-tab-btn active" onclick="switchAiTab('single')">单个链接</button>
                                <button class="ai-tab-btn" onclick="switchAiTab('excel')">Excel 批量</button>
                            </div>

                            <!-- 单个链接分析 -->
                            <div id="single" class="ai-tab-content active">
                                <div class="form-group">
                                    <label>Alibaba 产品链接 <span class="required">*</span></label>
                                    <input type="text" id="alibabaUrl" placeholder="粘贴 Alibaba 产品链接...">
                                </div>
                                <div class="form-group">
                                    <label>车型分类 <span class="required">*</span></label>
                                    <select id="aiCategory">
                                        <option value="japanese">日系车 (Toyota/Honda/Nissan/Mazda)</option>
                                        <option value="korean">韩系车 (Hyundai/Kia)</option>
                                        <option value="german">德系车 (BMW/Mercedes/VW/Audi)</option>
                                        <option value="chinese">国产车 (Baojun/Wuling/Geely)</option>
                                        <option value="other">其他</option>
                                    </select>
                                </div>
                                <button class="btn btn-primary" onclick="analyzeAlibabaLink()">
                                    <i class="fas fa-magic"></i> AI 分析
                                </button>

                                <!-- 分析结果 -->
                                <div id="aiResultWrap" style="display: none; margin-top: 20px; padding: 15px; background: #f9f9f9; border-left: 4px solid var(--success);">
                                    <h4 style="color: var(--success); margin-bottom: 12px;">✓ 分析完成</h4>
                                    <div class="form-group">
                                        <label>产品名称</label>
                                        <input type="text" id="aiResultName" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>OEM 编码</label>
                                        <input type="text" id="aiResultOem" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>适配车型</label>
                                        <input type="text" id="aiResultModel" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>产品描述</label>
                                        <textarea id="aiResultDesc" readonly></textarea>
                                    </div>
                                    <button class="btn btn-success" onclick="addAiResult()">
                                        <i class="fas fa-plus"></i> 添加到列表
                                    </button>
                                </div>
                            </div>

                            <!-- Excel 批量分析 -->
                            <div id="excel" class="ai-tab-content">
                                <div class="form-group">
                                    <label>上传 Excel 文件</label>
                                    <input type="file" id="excelFile" accept=".xlsx,.xls" onchange="handleExcelUpload(event)">
                                </div>
                                <button class="btn btn-primary" onclick="downloadExcelTemplate()">
                                    <i class="fas fa-download"></i> 下载模板
                                </button>
                                <div id="excelProgress" style="display: none; margin-top: 15px;">
                                    <div class="loading">
                                        <div class="spinner"></div>
                                        <p style="margin-top: 10px; color: #888;">正在分析 <span id="progressText">0/0</span>...</p>
                                    </div>
                                </div>
                                <div id="excelResults" style="display: none; margin-top: 15px;"></div>
                            </div>
                        </div>

                        <!-- 待导入列表 -->
                        <div style="margin-top: 20px;">
                            <h4 style="font-family: 'Oswald', sans-serif; color: var(--primary); margin-bottom: 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">待导入产品 (<span id="pendingCount">0</span>)</h4>
                            <div id="pendingList" class="ai-result-list"></div>
                            <button class="btn btn-success" onclick="importAllProducts()" style="margin-top: 12px;">
                                <i class="fas fa-cloud-upload-alt"></i> 一键导入到 GitHub
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：商品列表 -->
            <div>
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-list"></i> 商品列表
                    </div>
                    <div class="card-body">
                        <div class="product-list-scroll">
                            <table class="product-list-table">
                                <thead>
                                    <tr>
                                        <th>产品名称</th>
                                        <th>OEM 编码</th>
                                        <th>分类</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="productTableBody">
                                    <tr>
                                        <td colspan="4" style="text-align: center; color: #888;">加载中...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== 流量分析页面 ===== -->
<div id="analytics" class="page">
    <div class="analytics-page">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-chart-line"></i> 网站流量统计
            </div>
            <div class="card-body">
                <div class="chart-container">
                    <h3>访问量趋势</h3>
                    <canvas id="trafficChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>地区分布</h3>
                    <canvas id="regionChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== 客户询盘页面 ===== -->
<div id="inquiries" class="page">
    <div class="inquiries-page">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-envelope"></i> 客户询盘
            </div>
            <div class="card-body" id="inquiriesList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 10px; color: #888;">加载中...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== 编辑产品模态框 ===== -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeEditModal()">&times;</span>
        <div class="modal-header">编辑产品</div>
        <div class="form-group">
            <label>产品名称</label>
            <input type="text" id="editName">
        </div>
        <div class="form-group">
            <label>OEM 编码</label>
            <input type="text" id="editOem">
        </div>
        <div class="form-group">
            <label>图片文件名</label>
            <input type="text" id="editImage" placeholder="例如: 90919-01253(1).jpg">
        </div>
        <div class="form-group">
            <label>产品描述</label>
            <textarea id="editDesc"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveEditProduct()">保存修改</button>
        <button class="btn" style="background: #ccc; color: #333; margin-top: 10px; width: 100%;" onclick="closeEditModal()">取消</button>
    </div>
</div>

<script>
// ===== 全局数据 =====
var products = [];
var pendingProducts = [];
var githubConfig = {
    token: localStorage.getItem('github_token') || '',
    owner: localStorage.getItem('github_owner') || 'carvalauto',
    repo: localStorage.getItem('github_repo') || 'carvalauto.github.io',
    branch: localStorage.getItem('github_branch') || 'main'
};

// ===== 页面切换 =====
function switchTab(tabName) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.closest('.tab-btn').classList.add('active');

    if (tabName === 'analytics') initAnalytics();
    if (tabName === 'inquiries') loadInquiries();
}

function switchAiTab(tabName) {
    document.querySelectorAll('.ai-tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    document.querySelectorAll('.ai-tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

// ===== 加载产品数据 =====
async function loadProducts() {
    try {
        const response = await fetch('products.js');
        const text = await response.text();
        const match = text.match(/var\s+productsData\s*=\s*(\[[\s\S]*?\]);/);
        if (match) {
            products = JSON.parse(match[1]);
            updateStats();
            renderProductTable();
        }
    } catch (e) {
        console.error('加载产品数据失败:', e);
    }
}

// ===== 更新统计 =====
function updateStats() {
    const categories = {
        japanese: 0, korean: 0, german: 0, chinese: 0, other: 0
    };
    products.forEach(p => {
        const cat = p.category || 'other';
        categories[cat] = (categories[cat] || 0) + 1;
    });
    document.getElementById('totalProducts').textContent = products.length;
    document.getElementById('japaneseCount').textContent = categories.japanese;
    document.getElementById('koreanCount').textContent = categories.korean;
    document.getElementById('germanCount').textContent = categories.german;
    document.getElementById('chineseCount').textContent = categories.chinese;
    document.getElementById('otherCount').textContent = categories.other;
}

// ===== 渲染产品表格 =====
function renderProductTable() {
    const tbody = document.getElementById('productTableBody');
    if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #888;">暂无商品</td></tr>';
        return;
    }
    tbody.innerHTML = products.map(p => `
        <tr>
            <td>${p.name}</td>
            <td>${p.oem || '-'}</td>
            <td>${p.category || '其他'}</td>
            <td>
                <button class="btn btn-small btn-primary" onclick="editProduct('${p.id}')">编辑</button>
                <button class="btn btn-small btn-danger" onclick="deleteProduct('${p.id}')">删除</button>
            </td>
        </tr>
    `).join('');
}

// ===== AI 分析 Alibaba 链接 =====
function extractAlibabaInfo(url) {
    try {
        const urlObj = new URL(url);
        const pathParts = urlObj.pathname.split('/');
        let title = decodeURIComponent(pathParts[pathParts.length - 1] || '').replace(/-/g, ' ').replace(/\.html/g, '');
        let oem = '';
        
        // 尝试从 URL 中提取 OEM 编码
        const oemMatch = url.match(/[A-Z0-9]+-[A-Z0-9]+/);
        if (oemMatch) oem = oemMatch[0];
        
        return { title: title || 'Product', oem: oem, brand: '', models: '', specs: '', description: '' };
    } catch (e) {
        return { title: 'Auto Parts Product', oem: '', brand: '', models: '', specs: '', description: '' };
    }
}

function analyzeAlibabaLink() {
    const url = document.getElementById('alibabaUrl').value.trim();
    if (!url) {
        showToast('⚠ 请输入链接', '#e74c3c');
        return;
    }

    const extracted = extractAlibabaInfo(url);
    document.getElementById('aiResultName').value = extracted.title || 'Auto Parts Product';
    document.getElementById('aiResultOem').value = extracted.oem || '';
    document.getElementById('aiResultModel').value = 'Please specify compatible models';
    document.getElementById('aiResultDesc').value = 'Premium auto parts product. OEM quality guaranteed.';
    document.getElementById('aiResultWrap').style.display = 'block';
}

function addAiResult() {
    const name = document.getElementById('aiResultName').value.trim();
    const oem = document.getElementById('aiResultOem').value.trim();
    const model = document.getElementById('aiResultModel').value.trim();
    const desc = document.getElementById('aiResultDesc').value.trim();
    const category = document.getElementById('aiCategory').value;

    if (!name) {
        showToast('⚠ 产品名称不能为空', '#e74c3c');
        return;
    }

    pendingProducts.push({
        id: Date.now() + Math.random(),
        name: name,
        oem: oem,
        models: model,
        description: desc,
        category: category,
        images: []
    });

    updatePendingList();
    showToast('✓ 已添加到待导入列表', '#2ecc71');
    document.getElementById('aiResultWrap').style.display = 'none';
    document.getElementById('alibabaUrl').value = '';
}

function updatePendingList() {
    const list = document.getElementById('pendingList');
    document.getElementById('pendingCount').textContent = pendingProducts.length;
    if (pendingProducts.length === 0) {
        list.innerHTML = '<p style="text-align: center; color: #888;">暂无待导入产品</p>';
        return;
    }
    list.innerHTML = pendingProducts.map(p => `
        <div class="ai-result-item">
            <strong>${p.name}</strong> (${p.oem})<br>
            <small style="color: #888;">${p.category} | ${p.models}</small>
            <button class="btn btn-small btn-danger" style="float: right; margin-top: 5px;" onclick="removePending('${p.id}')">移除</button>
        </div>
    `).join('');
}

function removePending(id) {
    pendingProducts = pendingProducts.filter(p => p.id != id);
    updatePendingList();
}

// ===== 导入到 GitHub =====
async function importAllProducts() {
    if (pendingProducts.length === 0) {
        showToast('⚠ 没有待导入的产品', '#e74c3c');
        return;
    }

    if (!githubConfig.token) {
        showToast('⚠ 请先配置 GitHub Token', '#e74c3c');
        return;
    }

    // 合并产品
    const allProducts = [...products, ...pendingProducts];
    
    // 生成 products.js 内容
    const jsContent = 'var productsData = ' + JSON.stringify(allProducts, null, 2) + ';';
    
    // 上传到 GitHub
    try {
        const response = await fetch(`https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/products.js`, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${githubConfig.token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: `AI Auto: Add ${pendingProducts.length} products`,
                content: btoa(jsContent),
                branch: githubConfig.branch
            })
        });

        if (response.ok) {
            showToast('✓ 已成功导入 GitHub！', '#2ecc71');
            products = allProducts;
            pendingProducts = [];
            updateStats();
            renderProductTable();
            updatePendingList();
            loadProducts();
        } else {
            showToast('✗ 导入失败，请检查 Token', '#e74c3c');
        }
    } catch (e) {
        showToast('✗ 导入出错: ' + e.message, '#e74c3c');
    }
}

// ===== Excel 处理 =====
function downloadExcelTemplate() {
    const ws = XLSX.utils.aoa_to_sheet([
        ['产品链接', '产品名称', 'OEM编码', '车型分类', '产品描述'],
        ['https://www.alibaba.com/...', '产品名', 'OEM-123', 'japanese', '产品描述']
    ]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Products');
    XLSX.writeFile(wb, 'products_template.xlsx');
}

function handleExcelUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            pendingProducts = [];
            rows.slice(1).forEach(row => {
                if (row[0]) {
                    const extracted = extractAlibabaInfo(row[0]);
                    pendingProducts.push({
                        id: Date.now() + Math.random(),
                        name: row[1] || extracted.title,
                        oem: row[2] || extracted.oem,
                        models: row[3] || '',
                        description: row[4] || '',
                        category: row[3] || 'other',
                        images: []
                    });
                }
            });

            updatePendingList();
            showToast(`✓ 已导入 ${pendingProducts.length} 个产品`, '#2ecc71');
        } catch (e) {
            showToast('✗ Excel 解析失败', '#e74c3c');
        }
    };
    reader.readAsArrayBuffer(file);
}

// ===== 编辑产品 =====
function editProduct(id) {
    const product = products.find(p => p.id == id);
    if (!product) return;

    document.getElementById('editName').value = product.name;
    document.getElementById('editOem').value = product.oem || '';
    document.getElementById('editImage').value = product.images?.[0] || '';
    document.getElementById('editDesc').value = product.description || '';
    document.getElementById('editModal').classList.add('active');
    document.getElementById('editModal').dataset.productId = id;
}

function saveEditProduct() {
    const id = document.getElementById('editModal').dataset.productId;
    const product = products.find(p => p.id == id);
    if (!product) return;

    product.name = document.getElementById('editName').value;
    product.oem = document.getElementById('editOem').value;
    product.description = document.getElementById('editDesc').value;
    const imageName = document.getElementById('editImage').value;
    if (imageName) product.images = [imageName];

    closeEditModal();
    renderProductTable();
    showToast('✓ 产品已更新', '#2ecc71');
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
}

function deleteProduct(id) {
    if (confirm('确定删除此产品？')) {
        products = products.filter(p => p.id != id);
        renderProductTable();
        updateStats();
        showToast('✓ 产品已删除', '#2ecc71');
    }
}

// ===== 吐司提示 =====
function showToast(message, color = '#333') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    toast.style.background = color;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

window.addEventListener('load', () => {
    loadProducts();
});
