<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carval Auto - 后台管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f4c81;
            --accent: #e63946;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text: #f5f5f5;
            --text-muted: #888;
            --border: #333;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, var(--primary) 0%, #1a3a5c 100%); padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 100; }
        .header-logo { font-size: 16px; font-weight: 700; }
        .header-logo span { color: var(--accent); }
        .tab-nav { display: flex; gap: 4px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 7px 10px; cursor: pointer; font-size: 11px; font-weight: 500; border-radius: 5px; display: flex; align-items: center; gap: 4px; }
        .tab-btn.active { background: var(--accent); }
        .header-right a { color: white; text-decoration: none; font-size: 11px; padding: 6px 10px; background: rgba(255,255,255,0.1); border-radius: 5px; }
        
        .page { display: none; padding: 12px; max-width: 1400px; margin: 0 auto; }
        .page.active { display: block; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .stat-card { background: var(--bg-card); padding: 10px; border-radius: 6px; border-left: 3px solid var(--primary); }
        .stat-card.accent { border-left-color: var(--accent); }
        .stat-card.success { border-left-color: #2ecc71; }
        .stat-card.warning { border-left-color: #f39c12; }
        .stat-num { font-size: 20px; font-weight: 700; }
        .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
        
        .product-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .product-card { background: var(--bg-card); border-radius: 8px; overflow: hidden; }
        .product-img { width: 100%; height: 120px; object-fit: contain; background: #2a2a2a; padding: 10px; }
        .product-info { padding: 10px; }
        .product-title { font-size: 12px; font-weight: 600; margin-bottom: 5px; line-height: 1.3; }
        .product-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
        .product-tag { font-size: 8px; padding: 2px 5px; border-radius: 3px; background: rgba(15,76,129,0.3); color: #6db3f2; }
        .product-tag.oem { background: rgba(230,57,70,0.2); color: #ff6b7a; }
        .product-actions { display: flex; gap: 6px; padding-top: 8px; border-top: 1px solid var(--border); }
        .btn { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; display: flex; align-items: center; gap: 4px; }
        .btn-danger { background: rgba(230,57,70,0.2); color: #ff6b7a; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: rgba(46,204,113,0.2); color: #7dcea0; }
        .btn-sm { padding: 5px 8px; font-size: 9px; }
        
        .inquiry-list { display: flex; flex-direction: column; gap: 8px; }
        .inquiry-card { background: var(--bg-card); border-radius: 8px; padding: 10px; border-left: 3px solid var(--primary); }
        .inquiry-card.unread { border-left-color: var(--accent); }
        .inquiry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .inquiry-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        .inquiry-info { flex: 1; min-width: 0; }
        .inquiry-name { font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .inquiry-email { font-size: 10px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .inquiry-badge { font-size: 8px; padding: 1px 4px; border-radius: 2px; background: var(--accent); color: white; }
        .inquiry-meta { display: flex; flex-wrap: wrap; gap: 5px; font-size: 9px; color: var(--text-muted); margin-bottom: 6px; }
        .inquiry-message { font-size: 11px; color: var(--text); line-height: 1.4; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-bottom: 8px; word-break: break-word; }
        .inquiry-actions { display: flex; flex-wrap: wrap; gap: 5px; }
        
        .login-card { background: var(--bg-card); padding: 25px 15px; border-radius: 10px; text-align: center; max-width: 300px; margin: 30px auto; }
        .login-card .logo { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
        .login-card .logo span { color: var(--accent); }
        .login-card p { color: var(--text-muted); margin-bottom: 15px; font-size: 12px; }
        .btn-google { background: white; color: #333; padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-google img { width: 14px; height: 14px; }
        
        .charts-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .chart-card { background: var(--bg-card); border-radius: 8px; padding: 10px; }
        .chart-title { font-size: 11px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .chart-title i { color: var(--primary); }
        .date-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; background: var(--bg-card); padding: 8px 10px; border-radius: 6px; }
        .date-btn { background: rgba(255,255,255,0.1); border: none; color: var(--text); padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .date-btn.active { background: var(--primary); }
        .ga-user-info { display: flex; align-items: center; gap: 6px; margin-left: auto; }
        .ga-avatar { width: 24px; height: 24px; border-radius: 50%; }
        .ga-name { font-size: 10px; max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-logout { background: rgba(230,57,70,0.2); color: #ff6b7a; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 9px; }
        
        .search-bar { margin-bottom: 12px; }
        .search-input { width: 100%; padding: 8px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 11px; }
        
        .loading { text-align: center; padding: 25px; color: var(--text-muted); }
        .loading i { font-size: 24px; margin-bottom: 6px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .toast { position: fixed; bottom: 12px; left: 12px; right: 12px; background: #2ecc71; color: white; padding: 10px 12px; border-radius: 5px; font-size: 11px; z-index: 1000; opacity: 0; transform: translateY(20px); transition: all 0.3s; text-align: center; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #e74c3c; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 12px; }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-card); padding: 16px; border-radius: 8px; max-width: 280px; width: 100%; text-align: center; }
        .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .modal-text { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
        .modal-actions { display: flex; gap: 6px; justify-content: center; }
        
        @media (min-width: 600px) {
            .header { padding: 12px 18px; }
            .header-logo { font-size: 18px; }
            .tab-btn { padding: 9px 14px; font-size: 12px; }
            .page { padding: 18px; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
            .stat-num { font-size: 24px; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .product-img { height: 140px; }
            .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (min-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(7, 1fr); }
            .product-grid { grid-template-columns: repeat(3, 1fr); }
            .charts-grid { grid-template-columns: repeat(3, 1fr); }
            .login-card { padding: 35px; max-width: 380px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">CARVAL <span>AUTO</span></div>
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('products', this)"><i class="fas fa-box"></i> 商品</button>
            <button class="tab-btn" onclick="switchTab('inquiries', this)" id="inquiriesTabBtn"><i class="fas fa-envelope"></i> 询盘<span id="inquiryBadge" style="display:none;"></span></button>
            <button class="tab-btn" onclick="switchTab('analytics', this)"><i class="fas fa-chart-line"></i> 流量</button>
        </div>
        <div class="header-right">
            <a href="https://carvalautopart.com" target="_blank"><i class="fas fa-external-link-alt"></i> 网站</a>
        </div>
    </div>

    <div class="page active" id="page-products">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-num" id="totalCount">-</div><div class="stat-label">总商品</div></div>
            <div class="stat-card accent"><div class="stat-num" id="cat_japanese">-</div><div class="stat-label">日系</div></div>
            <div class="stat-card"><div class="stat-num" id="cat_korean">-</div><div class="stat-label">韩系</div></div>
            <div class="stat-card success"><div class="stat-num" id="cat_german">-</div><div class="stat-label">德系</div></div>
            <div class="stat-card warning"><div class="stat-num" id="cat_chinese">-</div><div class="stat-label">国产</div></div>
            <div class="stat-card"><div class="stat-num" id="cat_oil">-</div><div class="stat-label">机油</div></div>
            <div class="stat-card accent"><div class="stat-num" id="cat_other">-</div><div class="stat-label">其他</div></div>
        </div>
        <div class="search-bar"><input type="text" class="search-input" id="productSearch" placeholder="搜索商品名称、OEM..." oninput="searchProducts()"></div>
        <div class="product-grid" id="productList"><div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div></div>
    </div>

    <div class="page" id="page-inquiries">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-num" id="inq_total">-</div><div class="stat-label">总询盘</div></div>
            <div class="stat-card accent"><div class="stat-num" id="inq_unread">-</div><div class="stat-label">未读</div></div>
            <div class="stat-card success"><div class="stat-num" id="inq_today">-</div><div class="stat-label">今日</div></div>
            <div class="stat-card warning"><div class="stat-num" id="inq_countries">-</div><div class="stat-label">国家</div></div>
        </div>
        <div class="inquiry-list" id="inquiryList"><div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div></div>
    </div>

    <div class="page" id="page-analytics">
        <div id="loginSection">
            <div class="login-card">
                <div class="logo">CARVAL <span>AUTO</span></div>
                <p>连接 Google Analytics<br>查看网站流量数据</p>
                <button class="btn-google" onclick="handleLogin()"><img src="https://www.google.com/favicon.ico" alt=""> Google 登录</button>
            </div>
        </div>
        <div id="dashboardSection" style="display:none;">
            <div class="date-bar">
                <span style="font-size:11px;color:var(--text-muted);">时间：</span>
                <button class="date-btn active" onclick="setDateRange('7daysAgo', this)">7天</button>
                <button class="date-btn" onclick="setDateRange('30daysAgo', this)">30天</button>
                <button class="date-btn" onclick="setDateRange('90daysAgo', this)">90天</button>
                <div class="ga-user-info">
                    <img id="userAvatar" class="ga-avatar" src="" alt="">
                    <span class="ga-name" id="userName"></span>
                    <button class="btn-logout" onclick="handleLogout()">退出</button>
                </div>
            </div>
            <div class="stats-grid" style="grid-template-columns:repeat(5,1fr);">
                <div class="stat-card"><div class="stat-num" id="statPageviews">-</div><div class="stat-label">浏览量</div></div>
                <div class="stat-card accent"><div class="stat-num" id="statUsers">-</div><div class="stat-label">访客</div></div>
                <div class="stat-card success"><div class="stat-num" id="statSessions">-</div><div class="stat-label">会话</div></div>
                <div class="stat-card warning"><div class="stat-num" id="statDuration">-</div><div class="stat-label">停留</div></div>
                <div class="stat-card"><div class="stat-num" id="statRealtime">-</div><div class="stat-label">在线</div></div>
            </div>
            <div class="charts-grid">
                <div class="chart-card"><div class="chart-title"><i class="fas fa-chart-line"></i> 流量趋势</div><canvas id="trendChart"></canvas></div>
                <div class="chart-card"><div class="chart-title"><i class="fas fa-globe"></i> 国家分布</div><canvas id="countryChart"></canvas></div>
                <div class="chart-card"><div class="chart-title"><i class="fas fa-mobile-alt"></i> 设备分布</div><canvas id="deviceChart"></canvas></div>
            </div>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-title">确认删除</div>
            <div class="modal-text" id="deleteModalText">确定要删除吗？</div>
            <div class="modal-actions">
                <button class="btn" style="background:var(--border);" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
    let GH_TOKEN = localStorage.getItem('gh_token') || '';
    const GH_REPO = 'carvalauto/carvalauto.github.io';
    const GA_CLIENT_ID = '559377365954-4eutm6cufnggnskn8v35139vpo11opbo.apps.googleusercontent.com';
    const GA_PROPERTY_ID = '529242507';
    
    let allProducts = [], allInquiries = [], accessToken = null, tokenClient = null, deleteTarget = null;
    
    function checkToken() {
        if (!GH_TOKEN) {
            const t = prompt('请输入GitHub Token：');
            if (t) { GH_TOKEN = t; localStorage.setItem('gh_token', t); return true; }
            return false;
        }
        return true;
    }
    
    function switchTab(tab, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        btn.classList.add('active');
        if (tab === 'products') loadProducts();
        if (tab === 'inquiries') loadInquiries();
        if (tab === 'analytics') {
            if (accessToken) { document.getElementById('loginSection').style.display = 'none'; document.getElementById('dashboardSection').style.display = 'block'; loadAllData(); }
            else { document.getElementById('loginSection').style.display = 'block'; document.getElementById('dashboardSection').style.display = 'none'; }
        }
    }
    
    async function loadProducts() {
        if (!checkToken()) return;
        const c = document.getElementById('productList');
        c.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>';
        try {
            const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/products.json`, { headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
            const j = await r.json();
            const d = decodeURIComponent(escape(atob(j.content.replace(/\n/g, ''))));
            allProducts = JSON.parse(d);
            window.pSha = j.sha;
            // 缓存到 localStorage
            localStorage.setItem('cached_products', JSON.stringify({ data: allProducts, sha: j.sha, time: Date.now() }));
            renderProducts(allProducts);
        } catch(e) { 
            // 尝试从缓存加载
            const cached = localStorage.getItem('cached_products');
            if (cached) {
                const cachedData = JSON.parse(cached);
                allProducts = cachedData.data;
                window.pSha = cachedData.sha;
                renderProducts(allProducts);
                showToast('使用缓存数据', false);
            } else {
                c.innerHTML = '<div class="loading"><i class="fas fa-exclamation-circle" style="color:var(--accent);"></i><p>加载失败</p></div>'; 
            }
        }
    }
    
    function renderProducts(p) {
        const c = document.getElementById('productList');
        document.getElementById('totalCount').textContent = p.length;
        const cats = { japanese: 0, korean: 0, german: 0, chinese: 0, oil: 0, other: 0 };
        p.forEach(x => { const cat = (x.category || 'other').toLowerCase(); if (cats[cat] !== undefined) cats[cat]++; else cats.other++; });
        Object.keys(cats).forEach(k => { const el = document.getElementById('cat_' + k); if (el) el.textContent = cats[k]; });
        
        if (!p.length) { c.innerHTML = '<div class="loading"><i class="fas fa-box-open"></i><p>暂无商品</p></div>'; return; }
        c.innerHTML = p.map(x => {
            const img = (x.image || '').split(',')[0] || '';
            const cat = (x.category || 'other').toUpperCase();
            const name = (x.name || '未命名').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const oem = (x.oem || '').replace(/"/g, '&quot;');
            return `<div class="product-card" data-id="${x.id}">
                ${img ? `<img src="${img}" class="product-img" alt="" onerror="this.style.display='none'">` : '<div class="product-img" style="display:flex;align-items:center;justify-content:center;color:#555;"><i class="fas fa-image"></i></div>'}
                <div class="product-info">
                    <div class="product-title">${name}</div>
                    <div class="product-meta"><span class="product-tag">${cat}</span>${oem ? `<span class="product-tag oem">OEM: ${oem}</span>` : ''}</div>
                    <div class="product-actions"><button class="btn btn-danger delete-btn" data-id="${x.id}"><i class="fas fa-trash"></i> 删除</button></div>
                </div></div>`;
        }).join('');
        
        // 使用事件委托绑定删除按钮
        c.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = parseInt(this.getAttribute('data-id'));
                const product = allProducts.find(x => x.id === id);
                const name = product ? (product.name || '未命名') : '商品';
                confirmDelete('product', id, name);
            });
        });
    }
    
    function searchProducts() {
        const k = document.getElementById('productSearch').value.toLowerCase();
        renderProducts(allProducts.filter(p => (p.name || '').toLowerCase().includes(k) || (p.oem || '').toLowerCase().includes(k)));
    }
    
    async function loadInquiries() {
        if (!checkToken()) return;
        const c = document.getElementById('inquiryList');
        c.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>';
        try {
            const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/inquiries.json`, { headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
            const j = await r.json();
            const d = decodeURIComponent(escape(atob(j.content.replace(/\n/g, ''))));
            allInquiries = JSON.parse(d);
            window.iSha = j.sha;
            renderInquiries(allInquiries);
        } catch(e) { c.innerHTML = '<div class="loading"><i class="fas fa-exclamation-circle" style="color:var(--accent);"></i><p>加载失败: ' + e.message + '</p></div>'; }
    }
    
    function renderInquiries(list) {
        const c = document.getElementById('inquiryList');
        list = list.filter(i => i && (i.name || i.email || i.message));
        
        const unread = list.filter(i => !i.read).length;
        const today = new Date().toDateString();
        const todayCount = list.filter(i => { try { return new Date(i.timestamp).toDateString() === today; } catch(e) { return false; } }).length;
        const countries = new Set(list.map(i => i.country).filter(x => x)).size;
        
        document.getElementById('inq_total').textContent = list.length;
        document.getElementById('inq_unread').textContent = unread;
        document.getElementById('inq_today').textContent = todayCount;
        document.getElementById('inq_countries').textContent = countries;
        
        const badge = document.getElementById('inquiryBadge');
        if (unread > 0) { badge.style.cssText = 'background:var(--accent);color:white;border-radius:50%;width:14px;height:14px;font-size:9px;display:inline-flex;align-items:center;justify-content:center;margin-left:3px;'; badge.textContent = unread; }
        else badge.style.display = 'none';
        
        if (!list.length) { c.innerHTML = '<div class="loading"><i class="fas fa-inbox"></i><p>暂无询盘</p></div>'; return; }
        
        const flags = { 'China': '🇨🇳', 'United States': '🇺🇸', 'Japan': '🇯🇵', 'Germany': '🇩🇪', 'United Kingdom': '🇬🇧', 'France': '🇫🇷', 'South Korea': '🇰🇷', 'Australia': '🇦🇺', 'Canada': '🇨🇦', 'Hong Kong': '🇭🇰', 'Chile': '🇨🇱' };
        
        c.innerHTML = list.map(i => {
            const flag = flags[i.country] || '🌍';
            const timeAgo = ((ts) => { if (!ts) return '-'; const diff = Date.now() - ts; const m = Math.floor(diff/60000); if (m < 1) return '刚刚'; if (m < 60) return m + '分前'; const h = Math.floor(m/60); if (h < 24) return h + '时前'; return Math.floor(h/24) + '天前'; })(i.timestamp);
            const msg = (i.message || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
            const devIcon = i.device === '手机' ? 'mobile-alt' : (i.device === '平板' ? 'tablet-alt' : 'desktop');
            return `<div class="inquiry-card ${i.read ? '' : 'unread'}" data-id="${i.id}">
                <div class="inquiry-header"><div class="inquiry-avatar">${(i.name || 'U').charAt(0).toUpperCase()}</div><div class="inquiry-info"><div class="inquiry-name">${i.name || 'Unknown'} ${!i.read ? '<span class="inquiry-badge">NEW</span>' : ''}</div><div class="inquiry-email">${i.email || ''}</div></div></div>
                <div class="inquiry-meta"><span><i class="fas fa-map-marker-alt"></i> ${flag} ${i.country || '-'}</span><span><i class="fas fa-${devIcon}"></i> ${i.device || '电脑'}</span><span><i class="fas fa-clock"></i> ${timeAgo}</span></div>
                <div class="inquiry-message">${msg}</div>
                <div class="inquiry-actions">
                    <button class="btn btn-primary btn-sm" onclick="window.open('mailto:${i.email || ''}')"><i class="fas fa-reply"></i> 邮件</button>
                    ${!i.read ? `<button class="btn btn-success btn-sm mark-read-btn" data-id="${i.id}"><i class="fas fa-check"></i> 已读</button>` : ''}
                    <button class="btn btn-danger btn-sm inquiry-delete-btn" data-id="${i.id}"><i class="fas fa-trash"></i></button>
                </div></div>`;
        }).join('');
        
        // 绑定询盘删除按钮
        c.querySelectorAll('.inquiry-delete-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = parseInt(this.getAttribute('data-id'));
                confirmDelete('inquiry', id, '');
            });
        });
        
        // 绑定已读按钮
        c.querySelectorAll('.mark-read-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = parseInt(this.getAttribute('data-id'));
                markRead(id);
            });
        });
    }
    
    async function markRead(id) {
        const i = allInquiries.find(x => x.id === id);
        if (i) { i.read = true; await saveInquiries(); renderInquiries(allInquiries); }
    }
    
    async function saveInquiries() {
        try {
            const body = { message: 'Update inquiries', content: btoa(unescape(encodeURIComponent(JSON.stringify(allInquiries)))), sha: window.iSha };
            const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/inquiries.json`, { method: 'PUT', headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            const j = await r.json(); window.iSha = j.content.sha;
        } catch(e) {}
    }
    
    function confirmDelete(type, id, name) {
        deleteTarget = { type, id };
        const text = type === 'product' ? `删除"${name || '该商品'}"？网站将同步删除。` : '删除这条询盘？';
        document.getElementById('deleteModalText').textContent = text;
        document.getElementById('deleteModal').classList.add('show');
    }
    
    // 删除确认按钮事件绑定（在 DOM 加载后执行）
    function initDeleteButton() {
        const btn = document.getElementById('confirmDeleteBtn');
        if (!btn) return;
        
        btn.onclick = async function(e) {
            e.preventDefault();
            
            if (!deleteTarget) {
                showToast('请先选择要删除的项目', true);
                closeModal();
                return;
            }
            
            const targetType = deleteTarget.type;
            const targetId = deleteTarget.id;
            
            if (!targetType || targetId === undefined) {
                showToast('删除目标无效', true);
                closeModal();
                return;
            }
            
            closeModal();
            
            if (targetType === 'product') {
                if (!GH_TOKEN) {
                    const t = prompt('请输入GitHub Token：');
                    if (t) { GH_TOKEN = t; localStorage.setItem('gh_token', t); }
                    else { showToast('需要Token才能删除', true); return; }
                }
                showToast('正在删除...', false);
                try {
                    // 先获取最新的 SHA
                    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/products.json`, { headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
                    const j = await r.json();
                    let p = JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g, '')))));
                    
                    // 过滤删除的商品
                    const beforeCount = p.length;
                    p = p.filter(x => x.id !== targetId);
                    const afterCount = p.length;
                    
                    if (beforeCount === afterCount) {
                        showToast('未找到该商品', true);
                        return;
                    }
                    
                    // 更新到 GitHub
                    const body = { message: 'Delete product: ' + targetId, content: btoa(unescape(encodeURIComponent(JSON.stringify(p)))), sha: j.sha };
                    const updateR = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/products.json`, { method: 'PUT', headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    
                    if (updateR.ok) {
                        const updateJ = await updateR.json();
                        window.pSha = updateJ.content.sha;
                        // 更新缓存
                        localStorage.setItem('cached_products', JSON.stringify({ data: p, sha: updateJ.content.sha, time: Date.now() }));
                        allProducts = p;
                        renderProducts(allProducts);
                        showToast('删除成功！网站已同步更新', false);
                    } else {
                        const errData = await updateR.json();
                        showToast('删除失败: ' + (errData.message || 'GitHub错误'), true);
                    }
                } catch(e) { 
                    showToast('删除失败: ' + e.message, true); 
                }
            } else if (targetType === 'inquiry') {
                allInquiries = allInquiries.filter(x => x.id !== targetId);
                await saveInquiries();
                renderInquiries(allInquiries);
                showToast('已删除');
            }
        };
    }
    
    function closeModal() { document.getElementById('deleteModal').classList.remove('show'); deleteTarget = null; }
    function showToast(m, err) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast show' + (err ? ' error' : ''); setTimeout(() => t.classList.remove('show'), 2500); }
    
    // Google Analytics
    function handleLogin() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GA_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/analytics.readonly',
            callback: (r) => { if (r.access_token) { accessToken = r.access_token; localStorage.setItem('ga_token', accessToken); localStorage.setItem('ga_token_expiry', Date.now() + 3600000); document.getElementById('loginSection').style.display = 'none'; document.getElementById('dashboardSection').style.display = 'block'; loadAllData(); } }
        });
        tokenClient.requestAccessToken();
    }
    
    function handleLogout() { accessToken = null; localStorage.removeItem('ga_token'); localStorage.removeItem('ga_token_expiry'); document.getElementById('loginSection').style.display = 'block'; document.getElementById('dashboardSection').style.display = 'none'; }
    
    let startDate = '7daysAgo', endDate = 'yesterday';
    function setDateRange(s, btn) { startDate = s; document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); loadAllData(); }
    function loadAllData() { if (!accessToken) return; loadRealtime(); loadMetrics(); loadTrend(); loadCountries(); loadDevices(); }
    
    async function loadRealtime() {
        try { const r = await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${GA_PROPERTY_ID}:runRealtimeReport`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ metrics: [{ name: 'activeUsers' }] }) }); const d = await r.json(); document.getElementById('statRealtime').textContent = d.rows?.[0]?.metricValues?.[0]?.value || '0'; } catch(e) { document.getElementById('statRealtime').textContent = '-'; }
    }
    
    async function loadMetrics() {
        try { const r = await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${GA_PROPERTY_ID}:runReport`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ dateRanges: [{ startDate, endDate }], metrics: [{ name: 'screenPageViews' }, { name: 'totalUsers' }, { name: 'sessions' }, { name: 'averageSessionDuration' }] }) }); const d = await r.json(); const v = d.rows?.[0]?.metricValues || []; document.getElementById('statPageviews').textContent = parseInt(v[0]?.value || 0).toLocaleString(); document.getElementById('statUsers').textContent = parseInt(v[1]?.value || 0).toLocaleString(); document.getElementById('statSessions').textContent = parseInt(v[2]?.value || 0).toLocaleString(); const dur = parseFloat(v[3]?.value || 0); document.getElementById('statDuration').textContent = dur > 60 ? Math.floor(dur/60) + '分' : Math.round(dur) + '秒'; } catch(e) {}
    }
    
    let trendChart, countryChart, deviceChart;
    
    async function loadTrend() {
        try { const r = await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${GA_PROPERTY_ID}:runReport`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ dateRanges: [{ startDate, endDate }], dimensions: [{ name: 'date' }], metrics: [{ name: 'screenPageViews' }, { name: 'totalUsers' }], orderBys: [{ dimension: { dimensionName: 'date' } }] }) }); const d = await r.json(); const labels = d.rows?.map(x => x.dimensionValues[0].value.slice(-4)) || []; const views = d.rows?.map(x => parseInt(x.metricValues[0].value)) || []; const users = d.rows?.map(x => parseInt(x.metricValues[1].value)) || []; if (trendChart) trendChart.destroy(); trendChart = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels, datasets: [{ label: '浏览', data: views, borderColor: '#0f4c81', backgroundColor: 'rgba(15,76,129,0.1)', fill: true, tension: 0.4, pointRadius: 0 }, { label: '访客', data: users, borderColor: '#e63946', backgroundColor: 'rgba(230,57,70,0.1)', fill: true, tension: 0.4, pointRadius: 0 }] }, options: { responsive: true, plugins: { legend: { labels: { color: '#888' } } }, scales: { x: { ticks: { color: '#666' }, grid: { color: '#333' } }, y: { ticks: { color: '#666' }, grid: { color: '#333' } } } } }); } catch(e) {}
    }
    
    async function loadCountries() {
        try { const r = await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${GA_PROPERTY_ID}:runReport`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ dateRanges: [{ startDate, endDate }], dimensions: [{ name: 'country' }], metrics: [{ name: 'totalUsers' }], orderBys: [{ metric: { metricName: 'totalUsers' }, desc: true }], limit: 10 }) }); const d = await r.json(); const labels = d.rows?.map(x => x.dimensionValues[0].value) || []; const values = d.rows?.map(x => parseInt(x.metricValues[0].value)) || []; if (countryChart) countryChart.destroy(); countryChart = new Chart(document.getElementById('countryChart'), { type: 'bar', data: { labels, datasets: [{ data: values, backgroundColor: ['#0f4c81', '#e63946', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#3498db', '#95a5a6', '#d35400'] }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#666' }, grid: { color: '#333' } }, y: { ticks: { color: '#666' }, grid: { color: '#333' } } } } }); } catch(e) {}
    }
    
    async function loadDevices() {
        try { const r = await fetch(`https://analyticsdata.googleapis.com/v1beta/properties/${GA_PROPERTY_ID}:runReport`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ dateRanges: [{ startDate, endDate }], dimensions: [{ name: 'deviceCategory' }], metrics: [{ name: 'totalUsers' }] }) }); const d = await r.json(); const labels = d.rows?.map(x => x.dimensionValues[0].value) || []; const values = d.rows?.map(x => parseInt(x.metricValues[0].value)) || []; if (deviceChart) deviceChart.destroy(); deviceChart = new Chart(document.getElementById('deviceChart'), { type: 'doughnut', data: { labels, datasets: [{ data: values, backgroundColor: ['#0f4c81', '#e63946', '#2ecc71'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#888' } } } } }); } catch(e) {}
    }
    
    window.onload = function() { 
        // 初始化删除按钮事件
        initDeleteButton();
        
        // 先尝试从缓存快速显示
        const cached = localStorage.getItem('cached_products');
        if (cached) {
            try {
                const cachedData = JSON.parse(cached);
                allProducts = cachedData.data;
                window.pSha = cachedData.sha;
                renderProducts(allProducts);
            } catch(e) {}
        }
        // 然后从 GitHub 刷新数据
        loadProducts(); 
        const saved = localStorage.getItem('ga_token'); 
        const expiry = parseInt(localStorage.getItem('ga_token_expiry') || '0'); 
        if (saved && Date.now() < expiry) accessToken = saved; 
    };
    </script>
</body>
