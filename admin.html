<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carval Auto - 后台管理</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0f4c81; --accent: #e63946; --bg-dark: #0f0f0f; --bg-card: #1a1a1a; --text: #f5f5f5; --text-muted: #888; --border: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; }

        .header { background: linear-gradient(135deg, var(--primary) 0%, #1a3a5c 100%); padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; position: sticky; top: 0; z-index: 100; }
        .header-logo { font-size: 16px; font-weight: 700; }
        .header-logo span { color: var(--accent); }
        .tab-nav { display: flex; gap: 4px; }
        .tab-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 7px 10px; cursor: pointer; font-size: 11px; font-weight: 500; border-radius: 5px; display: flex; align-items: center; gap: 4px; }
        .tab-btn.active { background: var(--accent); }
        .header-right a { color: white; text-decoration: none; font-size: 11px; padding: 6px 10px; background: rgba(255,255,255,0.1); border-radius: 5px; }

        .page { display: none; padding: 12px; max-width: 1400px; margin: 0 auto; }
        .page.active { display: block; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .stat-card { background: var(--bg-card); padding: 10px; border-radius: 6px; border-left: 3px solid var(--primary); }
        .stat-card.accent { border-left-color: var(--accent); }
        .stat-card.success { border-left-color: #2ecc71; }
        .stat-card.warning { border-left-color: #f39c12; }
        .stat-num { font-size: 20px; font-weight: 700; }
        .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }

        .product-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .product-card { background: var(--bg-card); border-radius: 8px; overflow: hidden; display: flex; }
        .product-card-img { width: 80px; height: 80px; object-fit: cover; background: #2a2a2a; flex-shrink: 0; }
        .product-info { padding: 10px; flex: 1; min-width: 0; }
        .product-title { font-size: 12px; font-weight: 600; margin-bottom: 5px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
        .product-tag { font-size: 8px; padding: 2px 5px; border-radius: 3px; background: rgba(15,76,129,0.3); color: #6db3f2; }
        .product-tag.oem { background: rgba(230,57,70,0.2); color: #ff6b7a; }
        .product-actions { display: flex; gap: 6px; padding-top: 8px; border-top: 1px solid var(--border); }
        .btn { padding: 6px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 10px; display: flex; align-items: center; gap: 4px; }
        .btn-danger { background: rgba(230,57,70,0.2); color: #ff6b7a; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: rgba(46,204,113,0.2); color: #7dcea0; }
        .btn-edit { background: rgba(52,152,219,0.2); color: #5dade2; }
        .btn-sm { padding: 5px 8px; font-size: 9px; }

        .inquiry-list { display: flex; flex-direction: column; gap: 8px; }
        .inquiry-card { background: var(--bg-card); border-radius: 8px; padding: 10px; border-left: 3px solid var(--primary); transition: all 0.2s; }
        .inquiry-card.unread { border-left-color: var(--accent); background: rgba(230,57,70,0.05); }
        .inquiry-card:hover { background: rgba(255,255,255,0.05); }
        .inquiry-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .inquiry-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        .inquiry-info { flex: 1; min-width: 0; }
        .inquiry-name { font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .inquiry-email { font-size: 10px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .inquiry-badge { font-size: 8px; padding: 1px 4px; border-radius: 2px; background: var(--accent); color: white; }
        .inquiry-badge.read { background: #2ecc71; }
        .inquiry-meta { display: flex; flex-wrap: wrap; gap: 5px; font-size: 9px; color: var(--text-muted); margin-bottom: 6px; }
        .inquiry-message { font-size: 11px; color: var(--text); line-height: 1.4; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-bottom: 8px; word-break: break-word; }
        .inquiry-actions { display: flex; flex-wrap: wrap; gap: 5px; }

        .login-card { background: var(--bg-card); padding: 25px 15px; border-radius: 10px; text-align: center; max-width: 300px; margin: 30px auto; }
        .login-card .logo { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
        .login-card .logo span { color: var(--accent); }
        .btn-google { background: white; color: #333; padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }

        .charts-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .chart-card { background: var(--bg-card); border-radius: 8px; padding: 10px; }
        .chart-title { font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .chart-title i { color: var(--primary); margin-right: 5px; }
        .date-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; background: var(--bg-card); padding: 8px 10px; border-radius: 6px; }
        .date-btn { background: rgba(255,255,255,0.1); border: none; color: var(--text); padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .date-btn.active { background: var(--primary); }
        .ga-user-info { display: flex; align-items: center; gap: 6px; margin-left: auto; }
        .btn-logout { background: rgba(230,57,70,0.2); color: #ff6b7a; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 9px; }

        .search-bar { margin-bottom: 12px; }
        .search-input { width: 100%; padding: 8px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 11px; }

        .loading { text-align: center; padding: 25px; color: var(--text-muted); }
        .loading i { font-size: 24px; margin-bottom: 6px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .toast { position: fixed; bottom: 12px; left: 12px; right: 12px; background: #2ecc71; color: white; padding: 10px 12px; border-radius: 5px; font-size: 11px; z-index: 1000; opacity: 0; transform: translateY(20px); transition: all 0.3s; text-align: center; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: #e74c3c; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 12px; overflow-y: auto; }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-card); padding: 16px; border-radius: 8px; max-width: 280px; width: 100%; text-align: center; }
        .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
        .modal-text { color: var(--text-muted); font-size: 12px; margin-bottom: 12px; }
        .modal-actions { display: flex; gap: 6px; justify-content: center; }

        .edit-modal { max-width: 350px; text-align: left; }
        .edit-form { margin-bottom: 12px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 6px 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; }
        .images-editor { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
        .image-item { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 4px; }
        .image-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 3px; }
        .image-item input { flex: 1; min-width: 0; font-size: 9px; }
        .btn-remove { background: rgba(230,57,70,0.2); border: none; padding: 4px 6px; border-radius: 3px; cursor: pointer; color: #ff6b7a; }
        .btn-add-image { width: 100%; background: rgba(15,76,129,0.3); border: 1px dashed var(--primary); color: #6db3f2; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 10px; }
        .edit-actions { display: flex; gap: 6px; justify-content: flex-end; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 48px; margin-bottom: 10px; opacity: 0.3; }
        .empty-state p { font-size: 12px; }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="loginSection" class="login-card">
        <div class="logo">CARVAL <span>AUTO</span></div>
        <p style="margin-bottom:15px;color:var(--text-muted);font-size:12px;">后台管理系统</p>
        <button class="btn-google" onclick="handleLogin()">
            <i class="fab fa-google"></i> 使用 Google 账号登录
        </button>
    </div>

    <!-- 主界面 -->
    <div id="dashboardSection" style="display:none;">
        <div class="header">
            <div class="header-logo">CARVAL <span>AUTO</span> <span style="font-size:11px;color:rgba(255,255,255,0.5);">后台管理</span></div>
            <div class="tab-nav">
                <button class="tab-btn active" id="tab-products" onclick="switchTab('products')"><i class="fas fa-box"></i> 商品</button>
                <button class="tab-btn" id="tab-inquiries" onclick="switchTab('inquiries')"><i class="fas fa-envelope"></i> 询盘<span id="inquiryBadge" style="display:none;"></span></button>
                <button class="tab-btn" id="tab-analytics" onclick="switchTab('analytics')"><i class="fas fa-chart-line"></i> 分析</button>
            </div>
            <div class="header-right">
                <a href="https://carvalautopart.com" target="_blank"><i class="fas fa-external-link-alt"></i> 前端</a>
            </div>
        </div>

        <!-- 商品管理页 -->
        <div id="productsPage" class="page active">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">总商品</div></div>
                <div class="stat-card accent"><div class="stat-num" id="statToday">-</div><div class="stat-label">今日新增</div></div>
            </div>
            <div class="search-bar">
                <input type="text" class="search-input" id="productSearch" placeholder="搜索商品名称、OEM编码..." oninput="filterProducts()">
            </div>
            <div class="product-grid" id="productList"></div>
        </div>

        <!-- 询盘管理页 -->
        <div id="inquiriesPage" class="page">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-num" id="inq_total">-</div><div class="stat-label">总询盘</div></div>
                <div class="stat-card accent"><div class="stat-num" id="inq_unread">-</div><div class="stat-label">未读</div></div>
                <div class="stat-card success"><div class="stat-num" id="inq_today">-</div><div class="stat-label">今日</div></div>
            </div>
            <div class="search-bar">
                <input type="text" class="search-input" id="inquirySearch" placeholder="搜索询盘..." oninput="filterInquiries()">
            </div>
            <div class="inquiry-list" id="inquiryList">
                <div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>
            </div>
        </div>

        <!-- 数据分析页 -->
        <div id="analyticsPage" class="page">
            <div class="date-bar">
                <button class="date-btn active" onclick="setDateRange('7daysAgo', this)">7天</button>
                <button class="date-btn" onclick="setDateRange('30daysAgo', this)">30天</button>
                <button class="date-btn" onclick="setDateRange('90daysAgo', this)">90天</button>
                <div class="ga-user-info">
                    <span id="gaUserInfo"></span>
                    <button class="btn-logout" onclick="handleLogout()">退出</button>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-num" id="statRealtime">-</div><div class="stat-label">实时在线</div></div>
                <div class="stat-card"><div class="stat-num" id="statPageviews">-</div><div class="stat-label">浏览量</div></div>
                <div class="stat-card"><div class="stat-num" id="statUsers">-</div><div class="stat-label">访客数</div></div>
                <div class="stat-card"><div class="stat-num" id="statSessions">-</div><div class="stat-label">会话数</div></div>
            </div>
            <div class="charts-grid">
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-chart-line"></i> 流量趋势</div>
                    <canvas id="trendChart"></canvas>
                </div>
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-globe"></i> 国家分布</div>
                    <canvas id="countryChart"></canvas>
                </div>
                <div class="chart-card">
                    <div class="chart-title"><i class="fas fa-desktop"></i> 设备分布</div>
                    <canvas id="deviceChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑商品弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-content edit-modal">
            <div class="modal-title"><i class="fas fa-edit"></i> 编辑商品</div>
            <div class="edit-form">
                <div class="form-group"><label>商品标题</label><input type="text" id="editTitle" placeholder="输入商品标题..."></div>
                <div class="form-group">
                    <label>商品分类</label>
                    <select id="editCategory">
                        <option value="japanese">日系 Japanese</option>
                        <option value="korean">韩系 Korean</option>
                        <option value="german">德系 German</option>
                        <option value="chinese">国产 Chinese</option>
                        <option value="oil">机油 Engine Oil</option>
                        <option value="other">其他 Other</option>
                    </select>
                </div>
                <div class="form-group"><label>OEM 编码</label><input type="text" id="editOem" placeholder="输入 OEM 编码..."></div>
                <div class="form-group">
                    <label>商品图片</label>
                    <div class="images-editor" id="imagesEditor"></div>
                    <button type="button" class="btn-add-image" id="addImageBtn"><i class="fas fa-plus"></i> 添加图片</button>
                </div>
            </div>
            <div class="edit-actions">
                <button class="btn" id="cancelEditBtn" style="background:var(--border);">取消</button>
                <button class="btn btn-success" id="saveEditBtn"><i class="fas fa-save"></i> 保存</button>
            </div>
        </div>
    </div>

    <!-- 确认删除弹窗 -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-title"><i class="fas fa-exclamation-triangle"></i> 确认删除</div>
            <div class="modal-text" id="deleteModalText"></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeDeleteModal()" style="background:var(--border);">取消</button>
                <button class="btn btn-danger" onclick="executeDelete()"><i class="fas fa-trash"></i> 确认删除</button>
            </div>
        </div>
    </div>

    <!-- 成功提示弹窗 -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="modal-title" style="color:#2ecc71;"><i class="fas fa-check-circle"></i> 操作成功</div>
            <div class="modal-text" id="successModalText"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="closeSuccessBtn">确定</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== 配置常量 =====
        var API_BASE = 'https://carvalauto-api.vercel.app/api';
        var API_KEY = 'carvalauto-secure-api-key-2026';
        var GITHUB_API = 'https://api.github.com/repos/carvalauto/carvalauto.github.io';
        var GITHUB_TOKEN = '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';
        var GA_PROPERTY_ID = '529242507';
        var GA_CLIENT_ID = 'YOUR_GA_CLIENT_ID';

        // ===== 全局变量 =====
        var allProducts = [];
        var allInquiries = [];
        var editingProductId = null;
        var deleteTarget = null;
        var accessToken = null;

        // ===== API 请求封装 =====
        function apiRequest(endpoint, method, body) {
            var options = {
                method: method || 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                }
            };
            if (body) {
                options.body = JSON.stringify(body);
            }
            return fetch(API_BASE + endpoint, options)
                .then(function(r) {
                    if (!r.ok) {
                        return r.json().then(function(err) {
                            throw new Error(err.error || 'API 请求失败: ' + r.status);
                        }).catch(function() {
                            throw new Error('API 请求失败: ' + r.status);
                        });
                    }
                    return r.json();
                });
        }

        // ===== 工具函数 =====
        function showToast(msg, isError) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(function() { t.classList.remove('show'); }, 3000);
        }

        function showSuccessModal(title, text) {
            document.getElementById('successModalTitle').textContent = title || '操作成功';
            document.getElementById('successModalText').textContent = text || '网站已同步更新';
            document.getElementById('successModal').classList.add('show');
        }

        function closeSuccessModal() { document.getElementById('successModal').classList.remove('show'); }

        // ===== 页面切换 =====
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            document.getElementById(tab + 'Page').classList.add('active');
            if (tab === 'inquiries') loadInquiries();
        }

        // ===== 商品管理 (通过 API) =====
        function loadProducts() {
            var c = document.getElementById('productList');
            c.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>';
            
            apiRequest('/products', 'GET')
                .then(function(data) {
                    allProducts = data.products || data || [];
                    renderProducts();
                    updateProductStats();
                })
                .catch(function(e) {
                    c.innerHTML = '<div class="loading" style="color:var(--accent);"><i class="fas fa-exclamation-triangle"></i><p>加载失败: ' + e.message + '</p></div>';
                    showToast('加载商品失败: ' + e.message, true);
                });
        }

        function updateProductStats() {
            document.getElementById('statTotal').textContent = allProducts.length;
            var today = new Date().toISOString().split('T')[0];
            var todayCount = allProducts.filter(function(p) {
                var created = p.createdAt || p.updatedAt || '';
                return created.startsWith(today);
            }).length;
            document.getElementById('statToday').textContent = todayCount;
        }

        function renderProducts(products) {
            var list = products || allProducts;
            var c = document.getElementById('productList');
            if (!list.length) {
                c.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i><p>暂无商品</p></div>';
                return;
            }
            c.innerHTML = list.map(function(p) {
                var img = (p.image || p.images || '').toString().split(',')[0].trim();
                var cat = (p.category || 'other').toLowerCase();
                var catNames = { japanese: '日系', korean: '韩系', german: '德系', chinese: '国产', oil: '机油', other: '其他' };
                return '<div class="product-card"><img src="' + img + '" class="product-card-img" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 60%22><rect fill=%22%232a2a2a%22 width=%2260%22 height=%2260%22/><text x=%2230%22 y=%2235%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2210%22>No Img</text></svg>\'"><div class="product-info"><div class="product-title">' + (p.name || p.title || '未命名') + '</div><div class="product-meta"><span class="product-tag">' + catNames[cat] + '</span>' + (p.oem || p.oemCode ? '<span class="product-tag oem">OEM: ' + (p.oem || p.oemCode) + '</span>' : '') + '</div><div class="product-actions"><button class="btn btn-edit btn-sm" onclick="openEditModalById(' + p.id + ')"><i class="fas fa-edit"></i> 编辑</button><button class="btn btn-danger btn-sm" onclick="confirmDeleteProduct(' + p.id + ', \'' + (p.name || p.title || '该商品').replace(/'/g, "\\'") + '\')"><i class="fas fa-trash"></i> 删除</button></div></div></div>';
            }).join('');
        }

        function filterProducts() {
            var q = document.getElementById('productSearch').value.toLowerCase();
            var filtered = allProducts.filter(function(p) {
                return (p.name || p.title || '').toLowerCase().includes(q) ||
                       (p.oem || p.oemCode || '').toLowerCase().includes(q) ||
                       (p.category || '').toLowerCase().includes(q);
            });
            renderProducts(filtered);
        }

        function openEditModalById(id) {
            var product = allProducts.find(function(x) { return x.id == id || x.id === parseInt(id); });
            if (product) openEditModal(product);
        }

        function confirmDeleteProduct(id, name) {
            deleteTarget = { type: 'product', id: id };
            document.getElementById('deleteModalText').textContent = '删除 "' + (name || '该商品') + '"？此操作不可撤销。';
            document.getElementById('deleteModal').classList.add('show');
        }

        function openEditModal(product) {
            editingProductId = product.id;
            document.getElementById('editTitle').value = product.name || product.title || '';
            document.getElementById('editCategory').value = (product.category || 'other').toLowerCase();
            document.getElementById('editOem').value = product.oem || product.oemCode || '';
            var imagesEditor = document.getElementById('imagesEditor');
            var images = (product.image || product.images || '').toString().split(',').map(function(s) { return s.trim(); }).filter(Boolean);
            if (images.length) {
                imagesEditor.innerHTML = images.map(function(url) {
                    return '<div class="image-item"><img src="' + url + '" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 60 60%22><rect fill=%22%232a2a2a%22 width=%2260%22 height=%2260%22/><text x=%2230%22 y=%2235%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2210%22>Error</text></svg>\'"><input type="text" value="' + url + '" class="image-url"><button class="btn-remove" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button></div>';
                }).join('');
            } else {
                imagesEditor.innerHTML = '<div style="color:var(--text-muted);font-size:11px;padding:8px;text-align:center;">暂无图片，点击下方添加</div>';
            }
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() { document.getElementById('editModal').classList.remove('show'); editingProductId = null; }
        function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('show'); deleteTarget = null; }

        function saveProductEdit() {
            if (!editingProductId) return;
            var title = document.getElementById('editTitle').value.trim();
            var category = document.getElementById('editCategory').value;
            var oem = document.getElementById('editOem').value.trim();
            var imageInputs = document.querySelectorAll('.image-item .image-url');
            var images = Array.prototype.slice.call(imageInputs).map(function(i) { return i.value.trim(); }).filter(Boolean);
            var imageStr = images.join(',');

            showToast('正在保存...', false);

            var updateData = {
                name: title,
                title: title,
                category: category,
                oem: oem,
                oemCode: oem,
                image: imageStr,
                images: images,
                updatedAt: new Date().toISOString()
            };

            apiRequest('/products/' + editingProductId, 'PUT', updateData)
                .then(function(result) {
                    closeEditModal();
                    showToast('保存成功！', false);
                    loadProducts();
                })
                .catch(function(e) {
                    showToast('保存失败: ' + e.message, true);
                });
        }

        function executeDelete() {
            if (!deleteTarget) return;
            var targetType = deleteTarget.type;
            var targetId = deleteTarget.id;
            closeDeleteModal();

            if (targetType === 'product') {
                showToast('正在删除...', false);
                apiRequest('/products/' + targetId, 'DELETE')
                    .then(function(result) {
                        showToast('删除成功！', false);
                        loadProducts();
                    })
                    .catch(function(e) {
                        showToast('删除失败: ' + e.message, true);
                    });
            }
        }

        // ===== 询盘管理 (保持 GitHub 逻辑) =====
        function loadInquiries() {
            var c = document.getElementById('inquiryList');
            c.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>加载中...</p></div>';
            fetch(GITHUB_API + '/contents/inquiries.json?ref=main', {
                headers: { 'Authorization': 'token ' + GITHUB_TOKEN }
            })
            .then(function(r) {
                if (r.status === 404) {
                    return createInitialInquiriesFile();
                }
                if (!r.ok) throw new Error('加载失败');
                return r.json();
            })
            .then(function(data) {
                if (data.content) {
                    var content = atob(data.content);
                    allInquiries = JSON.parse(content);
                    updateInquiryStats();
                    renderInquiries();
                } else {
                    allInquiries = [];
                    updateInquiryStats();
                    renderInquiries();
                }
            })
            .catch(function(e) {
                c.innerHTML = '<div class="loading" style="color:var(--accent);"><i class="fas fa-exclamation-triangle"></i><p>加载失败: ' + e.message + '</p></div>';
            });
        }

        function createInitialInquiriesFile() {
            var initialData = [];
            var content = JSON.stringify(initialData, null, 2);
            var encoded = btoa(unescape(encodeURIComponent(content)));

            return fetch(GITHUB_API + '/contents/inquiries.json', {
                method: 'PUT',
                headers: { 
                    'Authorization': 'token ' + GITHUB_TOKEN,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Create inquiries.json',
                    content: encoded,
                    branch: 'main'
                })
            }).then(function(r) { return r.json(); })
              .then(function() { return {}; });
        }

        function updateInquiryStats() {
            var total = allInquiries.length;
            var unread = allInquiries.filter(function(i) { return i.status === 'unread'; }).length;
            var today = new Date().toISOString().split('T')[0];
            var todayCount = allInquiries.filter(function(i) { return i.createdAt.startsWith(today); }).length;

            document.getElementById('inq_total').textContent = total;
            document.getElementById('inq_unread').textContent = unread;
            document.getElementById('inq_today').textContent = todayCount;

            var badge = document.getElementById('inquiryBadge');
            if (unread > 0) {
                badge.textContent = unread;
                badge.style.display = 'inline';
            } else {
                badge.style.display = 'none';
            }
        }

        function renderInquiries(inquiries) {
            var list = inquiries || allInquiries;
            var c = document.getElementById('inquiryList');
            if (!list.length) {
                c.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无询盘</p></div>';
                return;
            }
            c.innerHTML = list.map(function(i) {
                var date = new Date(i.createdAt).toLocaleDateString('zh-CN');
                var initial = (i.name || '?')[0].toUpperCase();
                return '<div class="inquiry-card' + (i.status === 'unread' ? ' unread' : '') + '">' +
                    '<div class="inquiry-header">' +
                        '<div class="inquiry-avatar">' + initial + '</div>' +
                        '<div class="inquiry-info">' +
                            '<div class="inquiry-name">' + (i.name || '匿名') + (i.status === 'unread' ? '<span class="inquiry-badge">未读</span>' : '<span class="inquiry-badge read">已读</span>') + '</div>' +
                            '<div class="inquiry-email">' + (i.email || '') + (i.country ? ' • ' + i.country : '') + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="inquiry-meta">' +
                        '<span><i class="fas fa-calendar"></i> ' + date + '</span>' +
                        (i.phone ? '<span><i class="fas fa-phone"></i> ' + i.phone + '</span>' : '') +
                    '</div>' +
                    '<div class="inquiry-message">' + (i.message || '') + '</div>' +
                    '<div class="inquiry-actions">' +
                        (i.status === 'unread' ? '<button class="btn btn-success btn-sm" onclick="markAsRead(\'' + i.id + '\')"><i class="fas fa-check"></i> 标记已读</button>' : '') +
                        '<button class="btn btn-danger btn-sm" onclick="deleteInquiry(\'' + i.id + '\')"><i class="fas fa-trash"></i> 删除</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function filterInquiries() {
            var q = document.getElementById('inquirySearch').value.toLowerCase();
            var filtered = allInquiries.filter(function(i) {
                return (i.name || '').toLowerCase().includes(q) ||
                       (i.email || '').toLowerCase().includes(q) ||
                       (i.message || '').toLowerCase().includes(q) ||
                       (i.country || '').toLowerCase().includes(q);
            });
            renderInquiries(filtered);
        }

        function markAsRead(id) {
            var index = allInquiries.findIndex(function(i) { return i.id === id; });
            if (index === -1) return;

            allInquiries[index].status = 'read';
            allInquiries[index].readAt = new Date().toISOString();

            saveInquiriesToGitHub()
                .then(function() {
                    updateInquiryStats();
                    renderInquiries();
                    showToast('已标记为已读', false);
                })
                .catch(function(e) {
                    showToast('操作失败: ' + e.message, true);
                });
        }

        function deleteInquiry(id) {
            if (!confirm('确定要删除这个询盘吗？')) return;

            allInquiries = allInquiries.filter(function(i) { return i.id !== id; });

            saveInquiriesToGitHub()
                .then(function() {
                    updateInquiryStats();
                    renderInquiries();
                    showToast('删除成功', false);
                })
                .catch(function(e) {
                    showToast('删除失败: ' + e.message, true);
                });
        }

        function saveInquiriesToGitHub() {
            var content = JSON.stringify(allInquiries, null, 2);
            var encoded = btoa(unescape(encodeURIComponent(content)));

            return fetch(GITHUB_API + '/contents/inquiries.json?ref=main', {
                headers: { 'Authorization': 'token ' + GITHUB_TOKEN }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                return fetch(GITHUB_API + '/contents/inquiries.json', {
                    method: 'PUT',
                    headers: { 
                        'Authorization': 'token ' + GITHUB_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Update inquiries.json',
                        content: encoded,
                        sha: data.sha,
                        branch: 'main'
                    })
                });
            })
            .then(function(r) { 
                if (!r.ok) throw new Error('保存失败');
                return r.json(); 
            });
        }

        // ===== Google Analytics =====
        function initAnalytics() {
            var saved = localStorage.getItem('ga_token');
            var expiry = parseInt(localStorage.getItem('ga_token_expiry') || '0');
            if (saved && Date.now() < expiry) {
                accessToken = saved;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                loadAllData();
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
            }
        }

        function handleLogin() {
            if (typeof google === 'undefined') { showToast('Google API 未加载', true); return; }
            var client = google.accounts.oauth2.initTokenClient({
                client_id: GA_CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/analytics.readonly',
                callback: function(r) {
                    if (r.access_token) {
                        accessToken = r.access_token;
                        localStorage.setItem('ga_token', accessToken);
                        localStorage.setItem('ga_token_expiry', Date.now() + 3600000);
                        document.getElementById('loginSection').style.display = 'none';
                        document.getElementById('dashboardSection').style.display = 'block';
                        loadAllData();
                    }
                }
            });
            client.requestAccessToken();
        }

        function handleLogout() {
            accessToken = null;
            localStorage.removeItem('ga_token');
            localStorage.removeItem('ga_token_expiry');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
        }

        var currentDateRange = '7daysAgo';

        function setDateRange(range, btn) {
            currentDateRange = range;
            document.querySelectorAll('.date-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            loadAllData();
        }

        function loadAllData() {
            if (!accessToken) return;
            loadProducts();
            fetchRealtimeData();
            fetchOverviewData();
            fetchTrafficData();
        }

        function fetchRealtimeData() {
            fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runRealtimeReport', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ metrics: [{ name: 'activeUsers' }] })
            }).then(function(r) { return r.json(); }).then(function(d) {
                var count = d.rows ? d.rows[0].metricValues[0].value : '0';
                document.getElementById('statRealtime').textContent = count;
            }).catch(function(e) { console.error('Realtime error:', e); });
        }

        function fetchOverviewData() {
            fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runReport', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dateRanges: [{ startDate: currentDateRange, endDate: 'today' }],
                    metrics: [
                        { name: 'screenPageViews' },
                        { name: 'totalUsers' },
                        { name: 'sessions' },
                        { name: 'averageSessionDuration' }
                    ]
                })
            }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.rows) {
                    var row = d.rows[0];
                    document.getElementById('statPageviews').textContent = row.metricValues[0].value;
                    document.getElementById('statUsers').textContent = row.metricValues[1].value;
                    document.getElementById('statSessions').textContent = row.metricValues[2].value;
                    var avgDur = parseFloat(row.metricValues[3].value) || 0;
                    var mins = Math.floor(avgDur / 60);
                    var secs = Math.floor(avgDur % 60);
                    document.getElementById('statDuration').textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;
                }
            }).catch(function(e) { console.error('Overview error:', e); });
        }

        function fetchTrafficData() {
            fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runReport', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    dateRanges: [{ startDate: currentDateRange, endDate: 'today' }],
                    dimensions: [{ name: 'date' }],
                    metrics: [{ name: 'screenPageViews' }],
                    orderBys: [{ dimension: { dimensionName: 'date' }, desc: false }]
                })
            }).then(function(r) { return r.json(); }).then(function(d) {
                if (d.rows) {
                    var labels = d.rows.map(function(row) {
                        var date = row.dimensionValues[0].value;
                        return date.substring(4,6) + '/' + date.substring(6,8);
                    });
                    var values = d.rows.map(function(row) { return parseInt(row.metricValues[0].value); });
                    if (trendChart) trendChart.destroy();
                    var ctx = document.getElementById('trendChart').getContext('2d');
                    trendChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: '浏览量',
                                data: values,
                                borderColor: '#0f4c81',
                                backgroundColor: 'rgba(15,76,129,0.1)',
                                fill: true,
                                tension: 0.4
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                    });
                }
                return fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runReport', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        dateRanges: [{ startDate: currentDateRange, endDate: 'today' }],
                        dimensions: [{ name: 'country' }],
                        metrics: [{ name: 'sessions' }],
                        orderBys: [{ metric: { metricName: 'sessions' }, desc: true }],
                        limit: 5
                    })
                });
            }).then(function(r) { return r.json(); }).then(function(d2) {
                if (d2.rows) {
                    var cLabels = d2.rows.map(function(row) { return row.dimensionValues[0].value; });
                    var cValues = d2.rows.map(function(row) { return parseInt(row.metricValues[0].value); });
                    if (countryChart) countryChart.destroy();
                    var ctx2 = document.getElementById('countryChart').getContext('2d');
                    countryChart = new Chart(ctx2, {
                        type: 'doughnut',
                        data: {
                            labels: cLabels,
                            datasets: [{ data: cValues, backgroundColor: ['#0f4c81', '#e63946', '#2ecc71', '#f39c12', '#9b59b6'] }]
                        },
                        options: { responsive: true }
                    });
                }
                return fetch('https://analyticsdata.googleapis.com/v1beta/properties/' + GA_PROPERTY_ID + ':runReport', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        dateRanges: [{ startDate: currentDateRange, endDate: 'today' }],
                        dimensions: [{ name: 'deviceCategory' }],
                        metrics: [{ name: 'sessions' }],
                        orderBys: [{ metric: { metricName: 'sessions' }, desc: true }]
                    })
                });
            }).then(function(r) { return r.json(); }).then(function(d3) {
                if (d3.rows) {
                    var devLabels = d3.rows.map(function(row) { 
                        return row.dimensionValues[0].value === 'desktop' ? '电脑' : 
                               row.dimensionValues[0].value === 'mobile' ? '手机' : '平板'; 
                    });
                    var devValues = d3.rows.map(function(row) { return parseInt(row.metricValues[0].value); });
                    if (deviceChart) deviceChart.destroy();
                    var ctx3 = document.getElementById('deviceChart').getContext('2d');
                    deviceChart = new Chart(ctx3, {
                        type: 'pie',
                        data: {
                            labels: devLabels,
                            datasets: [{ data: devValues, backgroundColor: ['#0f4c81', '#e63946', '#f39c12'] }]
                        },
                        options: { responsive: true }
                    });
                }
            }).catch(function(e) { console.error('Traffic error:', e); });
        }

        var trendChart, countryChart, deviceChart;

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('addImageBtn').onclick = function() {
                var imagesEditor = document.getElementById('imagesEditor');
                var emptyTip = imagesEditor.querySelector('div[style]');
                if (emptyTip) emptyTip.remove();
                var newItem = document.createElement('div');
                newItem.className = 'image-item';
                newItem.innerHTML = '<img src="data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 60 60\'><rect fill=\'%232a2a2a\' width=\'60\' height=\'60\'/><text x=\'30\' y=\'35\' text-anchor=\'middle\' fill=\'%23666\' font-size=\'8\'>New</text></svg>"><input type="text" value="" class="image-url" placeholder="输入图片URL..."><button class="btn-remove" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>';
                imagesEditor.appendChild(newItem);
            };
            document.getElementById('saveEditBtn').onclick = saveProductEdit;
            document.getElementById('cancelEditBtn').onclick = closeEditModal;
            document.getElementById('closeSuccessBtn').onclick = closeSuccessModal;
            
            initAnalytics();
        });
    </script>
</body>
</html>
