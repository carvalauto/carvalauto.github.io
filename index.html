<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多语言网站</title>
    <style>
        .lang-btn{padding:8px 16px;margin:5px;cursor:pointer;border:1px solid #ccc;border-radius:4px;}
        .lang-btn.active{background:#2196F3;color:#fff;border-color:#2196F3;}
        .content{margin:20px;font-size:16px;line-height:1.8;}
    </style>
</head>
<body>
    <!-- 语言切换按钮 -->
    <button class="lang-btn active" onclick="changeLang('zh')">中文</button>
    <button class="lang-btn" onclick="changeLang('en')">英语</button>
    <button class="lang-btn" onclick="changeLang('es')">西班牙语</button>
    <button class="lang-btn" onclick="changeLang('fr')">法语</button>
    <button class="lang-btn" onclick="changeLang('de')">德语</button>
    <button class="lang-btn" onclick="changeLang('ru')">俄语</button>
    <button class="lang-btn" onclick="changeLang('ja')">日语</button>
    <button class="lang-btn" onclick="changeLang('ko')">韩语</button>
    <button class="lang-btn" onclick="changeLang('ar')">阿拉伯语</button>
    <button class="lang-btn" onclick="changeLang('pt')">葡萄牙语</button>
    <button class="lang-btn" onclick="changeLang('it')">意大利语</button>

    <!-- 网站内容 -->
    <div class="content">
        <h1 data-lang="title">欢迎访问我们的网站</h1>
        <p data-lang="home">首页</p>
        <p data-lang="product">产品展示</p>
        <p data-lang="price">价格优惠</p>
        <p data-lang="service">优质服务</p>
        <p data-lang="contact">联系我们：123456789</p>
    </div>

    <script>
        // 11种语言包
        const langs = {
            zh: {title:"欢迎访问我们的网站",home:"首页",product:"产品展示",price:"价格优惠",service:"优质服务",contact:"联系我们：123456789"},
            en: {title:"Welcome to our website",home:"Home",product:"Product Display",price:"Price Discount",service:"Quality Service",contact:"Contact us: 123456789"},
            es: {title:"Bienvenido a nuestro sitio web",home:"Inicio",product:"Exhibición de productos",price:"Descuento de precio",service:"Servicio de calidad",contact:"Contáctenos: 123456789"},
            fr: {title:"Bienvenue sur notre site web",home:"Accueil",product:"Exposition de produits",price:"Remise sur le prix",service:"Service de qualité",contact:"Contactez-nous: 123456789"},
            de: {title:"Willkommen auf unserer Website",home:"Startseite",product:"Produktpräsentation",price:"Preisnachlass",service:"Qualitativ hochwertiger Service",contact:"Kontaktiere uns: 123456789"},
            ru: {title:"Добро пожаловать на наш сайт",home:"Главная страница",product:"Показ товаров",price:"Скидка на цену",service:"Высококачественное обслуживание",contact:"Свяжитесь с нами: 123456789"},
            ja: {title:"当社のウェブサイトへようこそ",home:"ホーム",product:"製品ディスプレイ",price:"価格割引",service:"高品質なサービス",contact:"お問い合わせ：123456789"},
            ko: {title:"우리 웹사이트에 오신 것을 환영합니다",home:"홈",product:"제품 디스플레이",price:"가격 할인",service:"고품질 서비스",contact:"연락처: 123456789"},
            ar: {title:"مرحبًا بك في موقعنا على الويب",home:"الصفحة الرئيسية",product:"عرض المنتجات",price:"خصم السعر",service:"خدمة عالية الجودة",contact:"اتصل بنا: 123456789"},
            pt: {title:"Bem-vindo ao nosso site",home:"Início",product:"Exibição de produtos",price:"Desconto de preço",service:"Serviço de qualidade",contact:"Entre em contato conosco: 123456789"},
            it: {title:"Benvenuto sul nostro sito web",home:"Home",product:"Mostra di prodotti",price:"Sconto sul prezzo",service:"Servizio di qualità",contact:"Contattaci: 123456789"}
        };

        // 核心切换函数
        function changeLang(code) {
            // 切换按钮样式
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            // 替换文本
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                el.textContent = langs[code][key];
            });
        }

        // 默认加载中文
        window.onload = () => changeLang('zh');
    </script>
</body>
</html>
