<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (id && /^\d+$/.test(id)) {
    var target = '/products/' + id + '.html';
    document.querySelector('link[rel=canonical]').href = target;
    window.location.replace(target);
  } else {
    window.location.replace('/');
  }
})();
</script>
<noscript>
<meta http-equiv="refresh" content="0;url=/">
</noscript>
</head>
<body>
<p>Redirecting...</p>
</body>
</html>
