<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarValAuto Admin - 后台管理系统 v4</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .logo span {
            color: var(--text-secondary);
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .refresh-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: var(--accent);
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            background: var(--bg-secondary);
            padding: 0 2rem;
            gap: 0;
            border-bottom: 1px solid var(--border);
        }

        .nav-tab {
            padding: 1rem 2rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            color: var(--text-secondary);
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-tab:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Main Content */
        .main-content {
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-change {
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .stat-change.positive {
            color: var(--success);
        }

        .stat-change.negative {
            color: var(--danger);
        }

        /* Products Grid */
        .products-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
        }

        .section-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem;
        }

        .product-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--bg-primary);
        }

        .product-info {
            padding: 1rem;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .product-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .product-tag {
            background: var(--accent);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .product-tag.category {
            background: var(--success);
        }

        .product-tag.oem {
            background: var(--warning);
            color: #000;
        }

        .product-description {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }

        /* Inquiries Section */
        .inquiries-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.5rem;
        }

        .inquiry-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            border-left: 4px solid var(--accent);
            transition: all 0.3s;
        }

        .inquiry-card.unread {
            border-left-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }

        .inquiry-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .inquirer-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .inquirer-name {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .inquirer-email {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .inquiry-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .meta-badge {
            background: var(--bg-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .inquiry-message {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 0.5rem;
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .inquiry-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        /* Analytics Section */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 1.5rem;
        }

        .chart-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .chart-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* Loading State */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .filter-select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .search-input {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            flex: 1;
            min-width: 200px;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-tabs {
                overflow-x: auto;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .analytics-grid {
                grid-template-columns: 1fr;
            }

            .chart-container {
                height: 250px;
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.show {
            display: block;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Confirm Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .modal-message {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">CarValAuto <span>Admin v4</span></div>
        <div class="header-actions">
            <button class="refresh-btn" onclick="refreshAllData()">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                    <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                </svg>
                刷新数据
            </button>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="nav-tabs">
        <div class="nav-tab active" onclick="switchTab('products')">📦 商品管理</div>
        <div class="nav-tab" onclick="switchTab('inquiries')">💬 询盘管理</div>
        <div class="nav-tab" onclick="switchTab('analytics')">📊 流量分析</div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Products Tab -->
        <div id="products-tab" class="tab-content active">
            <div class="stats-grid" id="product-stats"></div>
            
            <div class="products-section">
                <div class="section-header">
                    <h2 class="section-title">商品列表</h2>
                </div>
                <div class="filter-bar">
                    <select class="filter-select" id="category-filter" onchange="filterProducts()">
                        <option value="all">全部分类</option>
                        <option value="japanese">日系车</option>
                        <option value="korean">韩系车</option>
                        <option value="german">德系车</option>
                        <option value="chinese">国产车</option>
                        <option value="oil">油品</option>
                        <option value="other">其他</option>
                    </select>
                    <input type="text" class="search-input" id="product-search" placeholder="搜索商品名称、OEM编码..." onkeyup="filterProducts()">
                </div>
                <div id="products-container" class="products-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载商品数据...
                    </div>
                </div>
            </div>
        </div>

        <!-- Inquiries Tab -->
        <div id="inquiries-tab" class="tab-content">
            <div class="stats-grid" id="inquiry-stats"></div>
            
            <div class="products-section">
                <div class="section-header">
                    <h2 class="section-title">询盘列表</h2>
                </div>
                <div class="filter-bar">
                    <select class="filter-select" id="read-filter" onchange="filterInquiries()">
                        <option value="all">全部询盘</option>
                        <option value="unread">未读</option>
                        <option value="read">已读</option>
                    </select>
                    <input type="text" class="search-input" id="inquiry-search" placeholder="搜索客户姓名、邮箱、消息..." onkeyup="filterInquiries()">
                </div>
                <div id="inquiries-container" class="inquiries-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        加载询盘数据...
                    </div>
                </div>
            </div>
        </div>

        <!-- Analytics Tab -->
        <div id="analytics-tab" class="tab-content">
            <div class="stats-grid" id="analytics-stats"></div>
            
            <div class="analytics-grid">
                <div class="chart-card">
                    <h3 class="chart-title">访问趋势（最近7天）</h3>
                    <div class="chart-container">
                        <canvas id="visitsChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <h3 class="chart-title">国家/地区分布</h3>
                    <div class="chart-container">
                        <canvas id="countryChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <h3 class="chart-title">设备类型分布</h3>
                    <div class="chart-container">
                        <canvas id="deviceChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <h3 class="chart-title">浏览器分布</h3>
                    <div class="chart-container">
                        <canvas id="browserChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span id="toast-message"></span>
    </div>

    <!-- Confirm Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 class="modal-title">确认删除</h3>
            <p class="modal-message" id="modal-message">确定要删除这个商品吗？此操作无法撤销。</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" id="confirm-delete-btn">确认删除</button>
            </div>
        </div>
    </div>

    <script>
        // GitHub API Configuration
        const GITHUB_TOKEN = 'YOUR_GITHUB_TOKEN_HERE';
        const REPO_OWNER = 'carvalauto';
        const REPO_NAME = 'carvalauto.github.io';
        const PRODUCTS_FILE = 'products.json';
        const INQUIRIES_FILE = 'inquiries.json';

        // Data Storage
        let products = [];
        let inquiries = [];
        let deleteProductId = null;

        // Category Labels
        const categoryLabels = {
            'japanese': '日系车',
            'korean': '韩系车',
            'german': '德系车',
            'chinese': '国产车',
            'oil': '油品',
            'other': '其他'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            loadInquiries();
            initCharts();
        });

        // Tab Switching
        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        // Load Products from GitHub
        async function loadProducts() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PRODUCTS_FILE}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3.raw'
                    }
                });

                if (!response.ok) throw new Error('Failed to load products');
                
                products = await response.json();
                renderProducts(products);
                updateProductStats();
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('products-container').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <p>加载商品数据失败</p>
                        <p style="font-size: 0.875rem; margin-top: 0.5rem;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load Inquiries from GitHub
        async function loadInquiries() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${INQUIRIES_FILE}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3.raw'
                    }
                });

                if (!response.ok) throw new Error('Failed to load inquiries');
                
                inquiries = await response.json();
                renderInquiries(inquiries);
                updateInquiryStats();
            } catch (error) {
                console.error('Error loading inquiries:', error);
                document.getElementById('inquiries-container').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <p>加载询盘数据失败</p>
                        <p style="font-size: 0.875rem; margin-top: 0.5rem;">${error.message}</p>
                    </div>
                `;
            }
        }

        // Render Products
        function renderProducts(productsToRender) {
            const container = document.getElementById('products-container');
            
            if (productsToRender.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <p>暂无商品数据</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = productsToRender.map(product => `
                <div class="product-card" data-category="${product.category}">
                    <img src="${product.image}" alt="${product.name}" class="product-image" 
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22%3E%3Crect fill=%22%23334155%22 width=%22300%22 height=%22200%22/%3E%3Ctext fill=%22%2394a3b8%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E无图片%3C/text%3E%3C/svg%3E'">
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-meta">
                            <span class="product-tag category">${categoryLabels[product.category] || product.category}</span>
                            ${product.oem ? `<span class="product-tag oem">${product.oem}</span>` : ''}
                        </div>
                        ${product.description ? `<p class="product-description">${product.description}</p>` : ''}
                        <div class="product-actions">
                            <button class="btn btn-danger" onclick="confirmDeleteProduct(${product.id})">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                                    <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                                </svg>
                                删除
                            </button>
                            ${product.url ? `<a href="${product.url}" target="_blank" class="btn btn-secondary">查看详情</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render Inquiries
        function renderInquiries(inquiriesToRender) {
            const container = document.getElementById('inquiries-container');
            
            if (inquiriesToRender.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <p>暂无询盘数据</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = inquiriesToRender.map(inquiry => `
                <div class="inquiry-card ${!inquiry.read ? 'unread' : ''}">
                    <div class="inquiry-header">
                        <div class="inquirer-info">
                            <div class="inquirer-name">${inquiry.name}</div>
                            <div class="inquirer-email">${inquiry.email}</div>
                        </div>
                        <div style="font-size: 0.875rem; color: var(--text-secondary);">
                            ${formatTimestamp(inquiry.timestamp)}
                        </div>
                    </div>
                    <div class="inquiry-meta">
                        ${inquiry.oem ? `<span class="meta-badge">OEM: ${inquiry.oem}</span>` : ''}
                        ${inquiry.country ? `<span class="meta-badge">🌍 ${inquiry.country}</span>` : ''}
                        ${inquiry.device ? `<span class="meta-badge">📱 ${inquiry.device}</span>` : ''}
                        ${inquiry.browser ? `<span class="meta-badge">🌐 ${inquiry.browser}</span>` : ''}
                    </div>
                    <div class="inquiry-message">${inquiry.message}</div>
                    <div class="inquiry-actions">
                        <button class="btn ${inquiry.read ? 'btn-secondary' : 'btn-success'}" 
                                onclick="toggleInquiryRead(${inquiry.id})">
                            ${inquiry.read ? '标记为未读' : '标记为已读'}
                        </button>
                        <a href="mailto:${inquiry.email}" class="btn btn-secondary">回复邮件</a>
                    </div>
                </div>
            `).join('');
        }

        // Update Product Stats
        function updateProductStats() {
            const total = products.length;
            const byCategory = {};
            
            products.forEach(p => {
                byCategory[p.category] = (byCategory[p.category] || 0) + 1;
            });

            document.getElementById('product-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">总商品数</div>
                    <div class="stat-value">${total}</div>
                </div>
                ${Object.entries(byCategory).map(([cat, count]) => `
                    <div class="stat-card">
                        <div class="stat-label">${categoryLabels[cat] || cat}</div>
                        <div class="stat-value">${count}</div>
                    </div>
                `).join('')}
            `;
        }

        // Update Inquiry Stats
        function updateInquiryStats() {
            const total = inquiries.length;
            const unread = inquiries.filter(i => !i.read).length;
            const read = total - unread;

            document.getElementById('inquiry-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">总询盘数</div>
                    <div class="stat-value">${total}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">未读询盘</div>
                    <div class="stat-value" style="color: var(--warning);">${unread}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">已读询盘</div>
                    <div class="stat-value">${read}</div>
                </div>
            `;
        }

        // Filter Products
        function filterProducts() {
            const category = document.getElementById('category-filter').value;
            const search = document.getElementById('product-search').value.toLowerCase();

            let filtered = products;

            if (category !== 'all') {
                filtered = filtered.filter(p => p.category === category);
            }

            if (search) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(search) ||
                    (p.oem && p.oem.toLowerCase().includes(search)) ||
                    (p.description && p.description.toLowerCase().includes(search))
                );
            }

            renderProducts(filtered);
        }

        // Filter Inquiries
        function filterInquiries() {
            const readStatus = document.getElementById('read-filter').value;
            const search = document.getElementById('inquiry-search').value.toLowerCase();

            let filtered = inquiries;

            if (readStatus === 'unread') {
                filtered = filtered.filter(i => !i.read);
            } else if (readStatus === 'read') {
                filtered = filtered.filter(i => i.read);
            }

            if (search) {
                filtered = filtered.filter(i => 
                    i.name.toLowerCase().includes(search) ||
                    i.email.toLowerCase().includes(search) ||
                    i.message.toLowerCase().includes(search)
                );
            }

            renderInquiries(filtered);
        }

        // Confirm Delete Product
        function confirmDeleteProduct(productId) {
            deleteProductId = productId;
            const product = products.find(p => p.id === productId);
            document.getElementById('modal-message').textContent = `确定要删除商品"${product.name}"吗？此操作将从 GitHub 同步删除，无法撤销。`;
            document.getElementById('modal-overlay').classList.add('show');
        }

        // Close Modal
        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
            deleteProductId = null;
        }

        // Delete Product
        async function deleteProduct() {
            if (!deleteProductId) return;

            const btn = document.getElementById('confirm-delete-btn');
            btn.disabled = true;
            btn.textContent = '删除中...';

            try {
                // Get current file SHA
                const fileResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PRODUCTS_FILE}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!fileResponse.ok) throw new Error('Failed to get file info');
                const fileData = await fileResponse.json();

                // Update products array
                const updatedProducts = products.filter(p => p.id !== deleteProductId);

                // Commit update to GitHub
                const updateResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PRODUCTS_FILE}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Delete product ID: ${deleteProductId}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updatedProducts, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (!updateResponse.ok) throw new Error('Failed to update file');

                // Update local data
                products = updatedProducts;
                renderProducts(products);
                updateProductStats();
                
                closeModal();
                showToast('商品删除成功！', 'success');
            } catch (error) {
                console.error('Error deleting product:', error);
                showToast('删除失败：' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '确认删除';
            }
        }

        // Toggle Inquiry Read Status
        async function toggleInquiryRead(inquiryId) {
            try {
                // Get current file SHA
                const fileResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${INQUIRIES_FILE}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!fileResponse.ok) throw new Error('Failed to get file info');
                const fileData = await fileResponse.json();

                // Update inquiry
                const updatedInquiries = inquiries.map(i => 
                    i.id === inquiryId ? { ...i, read: !i.read } : i
                );

                // Commit update to GitHub
                const updateResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${INQUIRIES_FILE}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Toggle read status for inquiry ID: ${inquiryId}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updatedInquiries, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (!updateResponse.ok) throw new Error('Failed to update file');

                // Update local data
                inquiries = updatedInquiries;
                renderInquiries(inquiries);
                updateInquiryStats();
                
                showToast('状态更新成功！', 'success');
            } catch (error) {
                console.error('Error toggling inquiry:', error);
                showToast('更新失败：' + error.message, 'error');
            }
        }

        // Refresh All Data
        async function refreshAllData() {
            showToast('正在刷新数据...', 'success');
            await Promise.all([loadProducts(), loadInquiries()]);
            showToast('数据刷新完成！', 'success');
        }

        // Format Timestamp
        function formatTimestamp(timestamp) {
            if (!timestamp) return '未知时间';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Show Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            
            toast.className = `toast ${type}`;
            toastMessage.textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

            const countryCtx = document.getElementById('countryChart').getContext('2d');

            const deviceCtx = document.getElementById('deviceChart').getContext('2d');

                    plugins: {

            // Browser Chart
            const browserCtx = document.getElementById('browserChart').getContext('2d');
            new Chart(browserCtx, {
                type: 'pie',
                data: {
                    labels: ['Chrome', 'Safari', 'Firefox', 'Edge', '其他'],
                    datasets: [{
                        data: [55, 20, 10, 10, 5],
                        backgroundColor: [
                            '#3b82f6',
                            '#10b981',
                            '#f59e0b',
                            '#8b5cf6',
                            '#6b7280'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {

                            labels: { color: '#94a3b8' }

            updateAnalyticsStats();

        // Get Last 7 Days Labels
        function getLast7Days() {
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                days.push(date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }));
            }
            return days;
        }

        // Update Analytics Stats
        function updateAnalyticsStats() {
            document.getElementById('analytics-stats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">总访问量</div>
                    <div class="stat-value">1,320</div>
                    <div class="stat-change positive">↑ 12% 较上周</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">访客数</div>
                    <div class="stat-value">920</div>
                    <div class="stat-change positive">↑ 8% 较上周</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">跳出率</div>
                    <div class="stat-value">32%</div>
                    <div class="stat-change positive">↓ 5% 较上周</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">平均停留时间</div>
                    <div class="stat-value">3:45</div>
                    <div class="stat-change positive">↑ 15秒 较上周</div>
                </div>
            `;
        }

        // Event Listeners
        document.getElementById('confirm-delete-btn').addEventListener('click', deleteProduct);
    </script>
