name: Auto Update Sitemap

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Generate and update sitemap
        run: |
          python3 -c "
import json
import base64
import urllib.request
from datetime import datetime

TOKEN = '${{ secrets.GITHUB_TOKEN }}'
REPO = '${{ github.repository }}'
BASE_URL = f'https://api.github.com/repos/{REPO}'

# 获取所有SEO页面
req = urllib.request.Request(
    f'{BASE_URL}/contents/products',
    headers={'Authorization': f'token {TOKEN}'}
)
with urllib.request.urlopen(req) as resp:
    result = json.loads(resp.read())

files = [f for f in result if f['name'].endswith('.html')]
today = datetime.now().strftime('%Y-%m-%d')

print(f'找到 {len(files)} 个SEO页面')

# 生成sitemap
sitemap = '''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">
  <url>
    <loc>https://carvalautopart.com/</loc>
    <lastmod>''' + today + '''</lastmod>
    <changefreq>daily</changefreq>
    <priority>1.0</priority>
  </url>
'''

for f in files:
    pid = f['name'].replace('.html', '')
    sitemap += f'''  <url>
    <loc>https://carvalautopart.com/products/{pid}.html</loc>
    <lastmod>''' + today + '''</lastmod>
    <changefreq>weekly</changefreq>
    <priority>0.8</priority>
  </url>
'''

sitemap += '</urlset>'

# 保存本地
with open('sitemap.xml', 'w') as fh:
    fh.write(sitemap)

print('sitemap.xml 生成完成')

# 获取当前sitemap的sha
req = urllib.request.Request(
    f'{BASE_URL}/contents/sitemap.xml',
    headers={'Authorization': f'token {TOKEN}'}
)
sha = None
try:
    with urllib.request.urlopen(req) as resp:
        sha = json.loads(resp.read()).get('sha')
except:
    pass

# 上传到GitHub
content_b64 = base64.b64encode(sitemap.encode()).decode()
data = {
    'message': f'Auto-update sitemap.xml ({len(files)} pages)',
    'content': content_b64,
    'branch': 'main'
}
if sha:
    data['sha'] = sha

req = urllib.request.Request(
    f'{BASE_URL}/contents/sitemap.xml',
    data=json.dumps(data).encode(),
    headers={'Authorization': f'token {TOKEN}'},
    method='PUT'
)

with urllib.request.urlopen(req) as resp:
    result = json.loads(resp.read())
    if 'commit' in result:
        print(f'✅ sitemap.xml 更新成功! ({len(files)} pages)')
    else:
        print(f'❌ 更新失败')
"
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-update sitemap.xml"
          file_pattern: "sitemap.xml"
